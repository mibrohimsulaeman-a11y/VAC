[package]
name = "vac-broker"
version = { workspace = true }
edition = "2024"
description = { workspace = true }
license = { workspace = true }
readme = "README.md"

[lints]
workspace = true

[dependencies]
vac-provider-core = { workspace = true }
vac-agent-loop = { workspace = true }
vac-state = { workspace = true }
vac-remote-service = { workspace = true }
vac-mcp-client = { workspace = true }
vac-foundation = { workspace = true, features = ["sqlite"] }
vac-mcp-proxy = { workspace = true }
rmcp = { workspace = true }
reqwest = { workspace = true }
rustls = { workspace = true }
tracing = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
tokio = { workspace = true }
chrono = { workspace = true }
sha2 = { workspace = true }
thiserror = { workspace = true }
axum = { workspace = true }
async-trait = { workspace = true }
async-stream = "0.3"
dirs = "5.0"
utoipa = { version = "5.4.0", features = ["chrono", "uuid"] }
tokio-util = { version = "0.7", features = ["rt"] }

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "sync", "time"] }
tower = "0.5"
http-body-util = "0.1"
tempfile = { workspace = true }


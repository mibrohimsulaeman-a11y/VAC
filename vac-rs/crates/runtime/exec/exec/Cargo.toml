[package]
name = "vac-exec"
version.workspace = true
edition.workspace = true
license.workspace = true
autotests = false

[[bin]]
name = "vac-exec"
path = "src/main.rs"

[lib]
name = "vac_exec"
path = "src/lib.rs"

[[test]]
name = "all"
path = "tests/all.rs"

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true, features = ["derive"] }
vac-arg0 = { workspace = true }
vac-exec-server = { workspace = true }
vac-config = { workspace = true }
vac-core = { workspace = true }
vac-git-utils = { workspace = true }
vac-login = { workspace = true }
vac-model-provider-info = { workspace = true }
vac-otel = { workspace = true }
vac-protocol = { workspace = true }
vac-utils-absolute-path = { workspace = true }
vac-utils-cli = { workspace = true }
vac-utils-oss = { workspace = true }
owo-colors = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
supports-color = { workspace = true }
tokio = { workspace = true, features = [
    "io-std",
    "macros",
    "process",
    "rt-multi-thread",
    "signal",
] }
tracing = { workspace = true, features = ["log"] }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
ts-rs = { workspace = true, features = [
    "uuid-impl",
    "serde-json-impl",
    "no-serde-warnings",
] }
uuid = { workspace = true }


[dev-dependencies]
assert_cmd = { workspace = true }
vac-apply-patch = { workspace = true }
vac-utils-cargo-bin = { workspace = true }
core_test_support = { workspace = true }
libc = { workspace = true }
opentelemetry = { workspace = true }
opentelemetry_sdk = { workspace = true }
predicates = { workspace = true }
pretty_assertions = { workspace = true }
tempfile = { workspace = true }
tracing-opentelemetry = { workspace = true }
uuid = { workspace = true }
walkdir = { workspace = true }
wiremock = { workspace = true }

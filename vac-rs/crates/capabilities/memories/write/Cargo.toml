[package]
edition.workspace = true
license.workspace = true
name = "vac-memories-write"
version.workspace = true

[lib]
name = "vac_memories_write"
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
chrono = { workspace = true }
vac-core = { workspace = true }
vac-config = { workspace = true }
vac-features = { workspace = true }
vac-git-utils = { workspace = true }
vac-login = { workspace = true }
vac-otel = { workspace = true }
vac-protocol = { workspace = true }
vac-rollout = { workspace = true }
vac-rollout-trace = { workspace = true }
vac-secrets = { workspace = true }
vac-state = { workspace = true }
vac-terminal-detection = { workspace = true }
vac-utils-absolute-path = { workspace = true }
vac-utils-output-truncation = { workspace = true }
vac-utils-template = { workspace = true }
futures = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["fs", "rt", "sync", "time"] }
tracing = { workspace = true, features = ["log"] }
uuid = { workspace = true, features = ["v4", "v5"] }

[dev-dependencies]
vac-models-manager = { workspace = true }
core_test_support = { workspace = true }
pretty_assertions = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["fs", "macros"] }
wiremock = { workspace = true }

[package]
name = "vac-network-proxy"
edition.workspace = true
version.workspace = true
license.workspace = true

[lib]
name = "vac_network_proxy"
path = "src/lib.rs"

[lints]
workspace = true

[features]
default = []
runtime-proxy = [
    "dep:vac-utils-rustls-provider",
    "dep:rama-core",
    "dep:rama-http",
    "dep:rama-http-backend",
    "dep:rama-net",
    "dep:rama-socks5",
    "dep:rama-tcp",
    "dep:rama-tls-rustls",
    "dep:rama-unix",
]

[dependencies]
anyhow = { workspace = true }
async-trait = { workspace = true }
clap = { workspace = true, features = ["derive"] }
chrono = { workspace = true }
vac-utils-absolute-path = { workspace = true }
vac-utils-home-dir = { workspace = true }
vac-utils-rustls-provider = { workspace = true, optional = true }
globset = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
time = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tracing = { workspace = true }
url = { workspace = true }
rama-core = { version = "=0.3.0-alpha.4", optional = true }
rama-http = { version = "=0.3.0-alpha.4", optional = true }
rama-http-backend = { version = "=0.3.0-alpha.4", features = ["tls"], optional = true }
rama-net = { version = "=0.3.0-alpha.4", features = ["http", "tls"], optional = true }
rama-socks5 = { version = "=0.3.0-alpha.4", optional = true }
rama-tcp = { version = "=0.3.0-alpha.4", features = ["http"], optional = true }
rama-tls-rustls = { version = "=0.3.0-alpha.4", features = ["http"], optional = true }

[dev-dependencies]
pretty_assertions = { workspace = true }
tempfile = { workspace = true }

[target.'cfg(target_family = "unix")'.dependencies]
rama-unix = { version = "=0.3.0-alpha.4", optional = true }

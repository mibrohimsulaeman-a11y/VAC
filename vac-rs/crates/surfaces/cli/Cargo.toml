[package]
name = "vac-surface-cli"
version.workspace = true
edition.workspace = true
license.workspace = true
build = "build.rs"

[[bin]]
name = "vac"
path = "src/main.rs"

[lib]
name = "vac_cli"
path = "src/lib.rs"

[lints]
workspace = true

[features]
default = []
exec-runtime = ["dep:vac-exec"]
full-cli = ["exec-runtime"]

[dependencies]
anyhow = { workspace = true }
clap = { workspace = true, features = ["derive"] }
clap_complete = { workspace = true }
owo-colors = { workspace = true }
serde_yaml = { workspace = true }
supports-color = { workspace = true }
toml_edit = { workspace = true }
vac-arg0 = { workspace = true }
vac-config = { workspace = true }
vac-core = { workspace = true }
vac-exec = { workspace = true, optional = true }
vac-protocol = { workspace = true }
vac-terminal-detection = { workspace = true }
vac-tui = { workspace = true }
vac-utils-cli = { workspace = true }

[dev-dependencies]
assert_matches = { workspace = true }
pretty_assertions = { workspace = true }

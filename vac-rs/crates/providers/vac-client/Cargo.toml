[package]
edition.workspace = true
license.workspace = true
name = "vac-client"
version.workspace = true

[dependencies]
vac-provider-http = { workspace = true }
reqwest = { workspace = true }
tracing = { workspace = true }

[lints]
workspace = true

[features]
default = []
provider-chatgpt = ["vac-provider-http/provider-chatgpt"]
provider-realtime = ["vac-provider-http/provider-realtime"]
provider-cloud-tests = ["provider-chatgpt", "provider-realtime"]
telemetry = ["vac-provider-http/telemetry"]
feedback = ["vac-provider-http/feedback"]

[dev-dependencies]
vac-utils-cargo-bin = { workspace = true }
opentelemetry_sdk = { workspace = true }
pretty_assertions = { workspace = true }
rcgen = { workspace = true }
tempfile = { workspace = true }
tracing-subscriber = { workspace = true }

[[bin]]
name = "provider-ca-probe"
path = "src/bin/provider_ca_probe.rs"
required-features = ["provider-cloud-tests"]

[package]
edition.workspace = true
license.workspace = true
name = "vac-analytics"
version.workspace = true

[lib]
doctest = false
name = "vac_analytics"
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
vac-runtime-protocol = { workspace = true }
vac-git-utils = { workspace = true }
vac-login = { workspace = true }
vac-model-provider = { workspace = true }
vac-plugin = { workspace = true }
vac-protocol = { workspace = true }
os_info = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
sha1 = { workspace = true }
tokio = { workspace = true, features = [
    "macros",
    "rt-multi-thread",
] }
tracing = { workspace = true, features = ["log"] }

[dev-dependencies]
vac-utils-absolute-path = { workspace = true }
pretty_assertions = { workspace = true }

[features]
default = []
telemetry-upload = []

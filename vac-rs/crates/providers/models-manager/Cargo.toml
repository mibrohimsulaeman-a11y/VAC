[package]
edition.workspace = true
license.workspace = true
name = "vac-models-manager"
version.workspace = true

[lib]
doctest = false
name = "vac_models_manager"
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
async-trait = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
vac-collaboration-mode-templates = { workspace = true }
vac-login = { workspace = true }
vac-otel = { workspace = true }
vac-protocol = { workspace = true }
vac-utils-output-truncation = { workspace = true }
vac-utils-template = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
tokio = { workspace = true, features = ["fs", "sync", "time"] }
tracing = { workspace = true, features = ["log"] }

[dev-dependencies]
pretty_assertions = { workspace = true }
serde_json = { workspace = true }
tempfile = { workspace = true }

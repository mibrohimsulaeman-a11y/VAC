schema_version: 1
kind: policy
id: vac.default-local
title: Default local policy
default_decision: approval_required
rules:
  - id: read-project
    match: { action: filesystem_read, path: project }
    decision: allow
    reason: Read-only project inspection is allowed.
  - id: write-project
    match: { action: filesystem_write, path: project }
    decision: approval_required
    reason: File writes require operator approval.
  - id: deny-secrets
    match: { data_class: secret_like }
    decision: deny
    reason: Secret-like values cannot be exposed.

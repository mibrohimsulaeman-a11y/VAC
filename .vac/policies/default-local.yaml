schema_version: 1
kind: policy
id: vac.policy.default_local
title: VAC default local policy
default_decision: deny
rules:
  - id: vac.policy.allow_read_workspace
    match:
      action: filesystem_read
      path: workspace
    decision: allow
    reason: Read-only source inspection is required for deterministic index and TUI status.
  - id: vac.policy.approval_for_delete
    match:
      action: filesystem_delete
      path: workspace
    decision: approval_required
    reason: Destructive filesystem action must use the approval popup.
  - id: vac.policy.approval_for_process
    match:
      action: execute_process
      path: workspace
    decision: approval_required
    reason: Process execution is gated by structured-command policy.
  - id: vac.policy.approval_for_network_https
    match:
      action: network_access
      network:
        host: "*"
        protocol: https
    decision: approval_required
    reason: Network reads are governed actions; HTTPS transport alone is not authorization.
  - id: vac.policy.deny_credentials
    match:
      action: credential_read
      data_class: secret_like
    decision: deny
    reason: Credentials must not enter memory/evidence/TUI render paths.

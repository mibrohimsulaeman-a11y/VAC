schema_version: 1
kind: policy
id: vac.evidence-signing
title: Evidence signing policy
default_decision: approval_required
owner: vac.control-plane.evidence
status: ready
rules:
  - id: require-approval-for-evidence-signing-key
    match:
      action: credential_read
      data_class: credential
    decision: approval_required
    reason: Evidence signing key access must remain operator-governed even when signing is optional.
evidence:
  signing:
    required: false
    algorithm: ed25519
    key_source: VAC_EVIDENCE_ED25519_SIGNING_KEY_BASE64
    required_behavior: fail_closed_when_required_key_missing
    optional_behavior: unsigned_with_governance_warning

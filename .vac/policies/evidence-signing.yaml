schema_version: 2
kind: policy
id: vac.policy.evidence-signing
title: Evidence signing policy
# Evidence is RUNNER-EMITTED only. Agent-authored evidence is rejected by `vac doctor evidence .`.
evidence:
  author: runner_only
  signing:
    key_env: VAC_EVIDENCE_ED25519_SIGNING_KEY_BASE64
    required_env: VAC_EVIDENCE_SIGNING_REQUIRED
    unsigned_behavior: warn_when_optional_fail_closed_when_required
  # A gate that did not run produces NO evidence; absence is treated as failing.
  absence_is: fail

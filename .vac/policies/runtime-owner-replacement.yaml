schema_version: 1
kind: policy
id: vac.runtime-owner-replacement
title: Runtime owner replacement policy
default_decision: approval_required
rules:
  - id: allow-runtime-owner-read-evidence
    match:
      action: filesystem_read
      path: project
    decision: approval_required
    reason: Runtime-owner gate evidence may inspect project files but remains operator-visible until Plan 32 thresholds are enforced.
  - id: require-approval-for-gate-edits
    match:
      action: filesystem_write
      path: project
    decision: approval_required
    reason: Runtime-owner gate, policy, and evidence changes must stay scoped and reviewed.
  - id: block-network-for-local-gates
    match:
      action: network_access
      network:
        host: "*"
    decision: deny
    reason: Runtime-owner replacement gates are local validation gates and must not depend on network access.
  - id: require-approval-for-process-gates
    match:
      action: process_execute
      path: project
    decision: approval_required
    reason: Runtime-owner replacement checks execute local validation commands and require operator approval.

schema_version: 1
kind: policy
id: vac.policy.destructive_shell
title: VAC destructive shell policy
rules:
  - id: vac.policy.shell.delete_recursive
    match:
      action: filesystem_delete
      path: project
    decision: approval_required
    reason: Recursive delete must use the destructive approval popup and be evidence-bound.
  - id: vac.policy.shell.rm_rf_target
    match:
      action: filesystem_delete
      path: project
    decision: approval_required
    reason: target/ deletes are allowed only after explicit operator confirmation.

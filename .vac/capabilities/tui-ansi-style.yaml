schema_version: 1
kind: capability
id: vac.tui.ansi-style
title: TUI operator ANSI style tokens
status: ready
owner:
  crate: vac-surface-tui
  module: operator_style
ownership:
  crates:
  - vac-tui
  modules:
  - operator_style
  - operator_ui_styles
description: Semantic style token layer for operator-console plain snapshots and live ratatui rendering.
depends_on:
- vac.tui
surfaces:
  tui:
    routes:
    - /
    - /capabilities
    - /runtime
  slash:
    commands:
    - /capabilities
    - /runtime
  palette: true
policy:
  risk: safe_read
  mutates_files: false
  network: false
  redaction: false
validation:
  commands:
  - id: vac.tui.ansi-style.validation.cmd001
    runner: bash
    args:
    - scripts/check-tui-operator-ansi-contract.sh
    risk: execute_process
    approval: policy
  - id: vac.tui.ansi-style.validation.cmd002
    runner: bash
    args:
    - scripts/check-tui-operator-live-adapter.sh
    risk: execute_process
    approval: policy
  gates:
  - semantic_roles_registered
  - ansi_snapshot_generated
  - strip_ansi_layout_preserved
  - live_adapter_wired
docs:
- docs/vac-init/VAC_INIT_PRODUCTION_HARDENING_A.md

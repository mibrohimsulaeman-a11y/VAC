schema_version: 1
kind: capability
id: vac.init.cli-runtime-foundation
title: VAC-Init CLI Runtime Foundation
status: ready
owner:
  crate: vac-surface-cli
  module: init_cli::plan_cli::why_cli::doctor_cli
ownership:
  crates:
  - vac-cli
  - vac-core
  modules:
  - init_cli
  - plan_cli
  - why_cli
  - doctor_cli
  - control_plane::vac_init_cli_runtime
  targets:
  - kind: module
    crate: vac-surface-cli
    module: init_cli
  - kind: module
    crate: vac-surface-cli
    module: plan_cli
  - kind: module
    crate: vac-surface-cli
    module: why_cli
  - kind: module
    crate: vac-surface-cli
    module: doctor_cli
  - kind: module
    crate: vac-core
    module: control_plane::vac_init_cli_runtime
  - kind: path
    include:
    - vac-rs/cli/src/init_cli.rs
    - vac-rs/cli/src/plan_cli.rs
    - vac-rs/cli/src/why_cli.rs
    - vac-rs/cli/src/doctor_cli.rs
    - vac-rs/cli/src/main.rs
    - vac-rs/control-plane/src/control_plane/vac_init_cli_runtime.rs
    - scripts/check-vac-init-cli-runtime-foundation-contract.sh
    - docs/vac-init/VAC_INIT_PRODUCTION_HARDENING_B.md
    - docs/validation/PRODUCTION_HARDENING_B1_B4_VALIDATION.md
    - .vac/.init/state.yaml
    - .vac/registry/trajectory/index.yaml
    exclude: []
description: Runtime CLI foundation for VAC-Init init state, semantic plan validation, safe rationale lookup, and doctor taxonomy wiring.
depends_on:
- vac.init.registry-strictness
- vac.init.lifecycle
- vac.init.semantic-plan
- vac.init.safe-rationale
- vac.init.doctor-release
surfaces:
  cli:
    enabled: true
    commands:
    - vac init
    - vac plan validate
    - vac why
    - vac doctor init
    - vac doctor evidence
    - vac doctor memory
    - vac doctor release
  palette: true
  tui:
    routes:
    - /capabilities
    - /workflow
policy:
  risk: safe_read
  mutates_files: true
  network: false
  redaction: true
  approval_required_for:
  - filesystem_write
  - execute_process
states:
- empty
- loading
- success
- failure
validation:
  gates:
  - vac_init_cli_runtime_foundation_contract
  - cli_surface_runtime_wiring
  - doctor_taxonomy_wiring
  commands:
  - id: vac.init.cli-runtime-foundation.validation.cmd001
    runner: bash
    args:
    - scripts/check-vac-init-cli-runtime-foundation-contract.sh
    risk: execute_process
    approval: policy
docs:
- docs/vac-init/VAC_INIT_PRODUCTION_HARDENING_B.md
- docs/validation/PRODUCTION_HARDENING_B1_B4_VALIDATION.md

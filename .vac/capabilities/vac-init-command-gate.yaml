schema_version: 1
kind: capability
id: vac.init.command-gate
title: VAC-Init Structured Command Gate
status: ready
owner:
  crate: vac-core
  module: control_plane::vac_init_command_gate
ownership:
  crates:
  - vac-core
  modules:
  - control_plane::vac_init_command_gate
  targets:
  - crate_name: vac-core
    module: control_plane::vac_init_command_gate
description: Structured command evaluator rejects free-form shell, runner paths, and shell metacharacters while policy-gating execute_process.

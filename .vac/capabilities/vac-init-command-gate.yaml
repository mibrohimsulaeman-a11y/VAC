policy:
  risk: safe_read
  mutates_files: false
  network: false
  redaction: false
  approval_required_for:
  - execute_process
states:
- empty
- loading
- success
- failure
validation:
  gates:
  - vac_init_command_gate_contract
  commands:
  - id: vac.init.command-gate.validation.cmd001
    runner: bash
    args:
    - scripts/check-vac-init-command-gate-contract.sh
    risk: execute_process
    approval: policy

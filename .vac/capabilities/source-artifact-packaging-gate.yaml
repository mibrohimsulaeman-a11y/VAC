schema_version: 1
kind: capability
id: vac.source_artifact.packaging_gate
title: Source Artifact Packaging Gate
status: ready
owner:
  crate: vac-surface-cli
  module: source_artifact_packaging_gate
ownership:
  crates:
  - vac-cli
  modules:
  - source_artifact_packaging_gate
  targets:
  - kind: path
    include:
    - scripts/check-vac-source-artifact-packaging-gate.sh
    - .vac/capabilities/source-artifact-packaging-gate.yaml
    - docs/monolith-quality/O5O6_CONTROL_PLANE_AUDIT_FINDINGS_REPORT.md
    exclude: []
description: Enforces commit-like source artifact packaging hygiene so sandbox ZIPs exclude build/cache state and carry legal/evidence metadata.
depends_on:
- vac.tui.source-artifact-hygiene
surfaces:
  cli:
    commands:
    - scripts/check-vac-source-artifact-packaging-gate.sh
  palette: false
policy:
  risk: safe_read
  mutates_files: false
  network: false
  redaction: false
validation:
  commands:
  - id: vac.source-artifact.packaging-gate.validation.cmd001
    runner: bash
    args:
    - scripts/check-vac-source-artifact-packaging-gate.sh
    risk: execute_process
    approval: policy
  gates:
  - no_target_directory
  - no_git_directory
  - no_node_modules
  - zip_integrity_when_supplied
  - legal_release_files_present
docs:
- docs/monolith-quality/O5O6_CONTROL_PLANE_AUDIT_FINDINGS_REPORT.md

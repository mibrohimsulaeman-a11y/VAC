schema_version: 1
kind: capability
id: vac.tui.operator-visual-fidelity-matrix
title: TUI Operator Visual Fidelity Matrix
status: ready
owner:
  crate: vac-surface-tui
  module: operator_ui
description: Deterministic plain-text and ANSI snapshot matrix across 120x36, 140x40, and 180x48 viewports for first launch, idle, agent streaming, approval popup, runtime jobs, and capability dashboard.
depends_on:
- vac.tui.operator-visual-gate
- vac.tui.ansi-style
surfaces:
  tui:
    routes:
    - /visual-gate
  palette: false
policy:
  risk: safe_read
  mutates_files: false
  network: false
  redaction: false
validation:
  commands:
  - id: vac.tui.operator-visual-fidelity-matrix.validation.cmd001
    runner: bash
    args:
    - scripts/check-tui-operator-visual-fidelity-matrix.sh
    risk: execute_process
    approval: policy
  gates:
  - viewport_120x36
  - viewport_140x40
  - viewport_180x48
  - plain_snapshot_matrix
  - ansi_snapshot_matrix
docs:
- docs/vac-init/VAC_INIT_PRODUCTION_HARDENING_A.md
ownership:
  crates:
  - vac-tui
  modules:
  - operator_ui
  targets:
  - kind: module
    crate: vac-surface-tui
    module: operator_ui
  - kind: path
    include:
    - .vac/capabilities/tui-operator-visual-fidelity-matrix.yaml
    - docs/vac-init/VAC_INIT_PRODUCTION_HARDENING_A.md
    - scripts/check-tui-operator-visual-fidelity-matrix.sh
    exclude: []

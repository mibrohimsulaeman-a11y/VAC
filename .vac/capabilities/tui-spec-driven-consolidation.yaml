schema_version: 1
kind: capability
id: vac.tui.spec-driven-consolidation
title: TUI Spec-Driven Consolidation
status: ready
owner:
  crate: vac-surface-tui
  module: operator_ui
description: Ensures hardening surfaces are registered as .vac capabilities, workflows, and TUI routes instead of remaining code-only changes.
depends_on:
- vac.tui
surfaces:
  tui:
    routes:
    - /capabilities
  palette: true
policy:
  risk: safe_read
  mutates_files: false
  network: false
  redaction: false
validation:
  commands:
  - id: vac.tui.spec-driven-consolidation.validation.cmd001
    runner: bash
    args:
    - scripts/check-tui-spec-driven-consolidation.sh
    risk: execute_process
    approval: policy
  gates:
  - capability_manifest_registered
  - workflow_registered
  - surface_registered
  - validation_gate_registered
docs:
- docs/vac-init/VAC_INIT_PRODUCTION_HARDENING_A.md
ownership:
  crates:
  - vac-tui
  modules:
  - operator_ui
  targets:
  - kind: module
    crate: vac-surface-tui
    module: operator_ui
  - kind: path
    include:
    - .vac/capabilities/tui-spec-driven-consolidation.yaml
    - docs/vac-init/VAC_INIT_PRODUCTION_HARDENING_A.md
    - scripts/check-tui-spec-driven-consolidation.sh
    exclude: []

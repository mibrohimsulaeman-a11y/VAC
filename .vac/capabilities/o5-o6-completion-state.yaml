schema_version: 1
kind: capability
id: vac.o5-o6.completion-state
title: O5/O6 completion state
status: ready
owner:
  crate: vac-core
  module: control_plane::registry
ownership:
  crates:
  - vac-core
  modules:
  - control_plane::registry
  targets:
  - kind: path
    include:
    - .vac/registry/o5-o6-monolith-quality-state.yaml
    - .vac/registry/o5-godfile-staging-state.yaml
    - .vac/registry/o5-donor-delete-gate.yaml
    - .vac/registry/o6-quality-triage.yaml
    - .vac/registry/o6-docs-pruning-state.yaml
    - .vac/registry/o6-e2e-expansion-state.yaml
    - docs/monolith-quality/**
    - scripts/check-vac-o5-o6-completion-state.sh
    - scripts/check-vac-o5-2-godfile-staging-all.sh
    - scripts/check-vac-o5-3-utils-consolidation-report.sh
    - scripts/check-vac-o5-4-workspace-consolidation-report.sh
    - scripts/check-vac-o5-5-donor-delete-gate.sh
    - scripts/check-vac-o6-3-docs-pruning-classification.sh
    - scripts/check-vac-o6-4-e2e-expansion-scaffold.sh
    exclude: []
description: Aggregates O5 monolith/refactor and O6 quality de-risk implementation/scaffold state without claiming build readiness.
depends_on:
- vac.o5-o6.monolith-quality
- vac.monolith.godfile-staging
- vac.quality.depanic-unsafe-triage
policy:
  risk: safe_read
  mutates_files: false
  network: false
  redaction: false
  approval_required_for: []
surfaces:
  cli:
    enabled: true
    commands:
    - bash scripts/check-vac-o5-o6-completion-state.sh
    - bash scripts/check-vac-o5-2-godfile-staging-all.sh
    - bash scripts/check-vac-o5-5-donor-delete-gate.sh
states:
- empty
- loading
- success
- failure
validation:
  gates:
  - o5_o6_completion_state
  commands:
  - id: vac.o5-o6.completion-state.validation.cmd001
    runner: bash
    args:
    - scripts/check-vac-o5-o6-completion-state.sh
    risk: execute_process
    approval: policy

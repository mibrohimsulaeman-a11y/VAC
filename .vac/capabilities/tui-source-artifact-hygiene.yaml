schema_version: 1
kind: capability
id: vac.tui.source-artifact-hygiene
title: TUI Source Artifact Hygiene
status: ready
owner:
  crate: vac-surface-tui
  module: operator_ui
description: Source-zip safety contract ensuring sandbox commits do not include target directories, .git metadata, compiled Rust artifacts, or large generated build cache files.
depends_on:
- vac.tui
surfaces:
  tui:
    routes:
    - /artifact-hygiene
states:
- empty
- loading
- success
- failure
policy:
  risk: safe_read
  mutates_files: false
  network: false
  redaction: false
validation:
  commands:
  - id: vac.tui.source-artifact-hygiene.validation.cmd001
    runner: bash
    args:
    - scripts/check-tui-source-artifact-hygiene.sh
    risk: execute_process
    approval: policy
  gates:
  - no_target_directory
  - no_git_directory
  - no_compiled_objects
  - source_zip_ready
ownership:
  crates:
  - vac-tui
  modules:
  - operator_ui
  targets:
  - kind: module
    crate: vac-surface-tui
    module: operator_ui
  - kind: path
    include:
    - .vac/capabilities/tui-source-artifact-hygiene.yaml
    - scripts/check-tui-source-artifact-hygiene.sh
    exclude: []

schema_version: 1
kind: capability
id: vac.workflow
title: Workflow Control Plane Engine
status: ready
ownership:
  annotation: vac.workflow
  paths:
    include:
      - "vac-rs/crates/control-plane/control-plane/**"
    exclude:
      - "**/target/**"
# Workflow-engine modules inside control-plane are disambiguated from vac.architecture
# by in-source annotation during `vac scan`, not by hand-listed module paths.
policy:
  risk: medium
  mutates_files: true
  network: false
  approval_required_for: [filesystem_write, execute_process]
depends_on: [vac.architecture]

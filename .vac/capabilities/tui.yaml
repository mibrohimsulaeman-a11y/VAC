description: Root interactive frontend and operator cockpit for the VAC product.
reason: 'Default TUI session ownership now uses the owner-native runtime protocol and local-runtime-owner surfaces. Legacy app-server compatibility is retired; local means no separate app-server process. Provider login/API access remains supported.

  '
depends_on:
- vac.chat
- vac.approvals
- vac.workflow
surfaces:
  palette: true
  tui:
    routes:
    - /capabilities
states:
- empty
- loading
- success
- failure
policy:
  risk: safe_read
  mutates_files: false
  network: false
  redaction: false
validation:
  commands:
  - id: vac.tui.validation.cmd001
    runner: cargo
    args:
    - +1.95.0
    - check
    - -p
    - vac-surface-tui
    - --tests
    risk: execute_process
    approval: policy
  - id: vac.tui.validation.cmd002
    runner: bash
    args:
    - scripts/check-tui-operator-ui-contract.sh
    risk: execute_process
    approval: policy
  - id: vac.tui.validation.cmd003
    runner: bash
    args:
    - scripts/check-tui-operator-ui-visual-contract.sh
    risk: execute_process
    approval: policy
  - id: vac.tui.validation.cmd004
    runner: bash
    args:
    - scripts/check-tui-operator-snapshot-contract.sh
    risk: execute_process
    approval: policy
operator_ui_batch3_validation:
  commands:
  - bash scripts/check-tui-operator-ansi-contract.sh
  - bash scripts/check-tui-operator-live-adapter.sh
  - bash scripts/check-tui-pty-gate-contract.sh
  gates:
  - ansi_style_tokens
  - live_adapter_wiring
  - pty_contract_documented
operator_ui_hardening_validation:
  commands:
  - bash scripts/check-tui-hardening-regression-lock.sh
  - bash scripts/check-tui-status-output-contract.sh
  - bash scripts/check-tui-status-deep-hardening-contract.sh
  - rustc --edition 2024 --test vac-rs/crates/surfaces/tui/src/status/output_contract.rs -o /tmp/vac-status-output-contract-test && /tmp/vac-status-output-contract-test --nocapture
  - bash scripts/check-tui-renderer-semantic-contract.sh
  gates:
  - hardening_1_regression_lock
  - hardening_2_semantic_renderer_contract
  - status_output_no_rate_limit_credit_display
  - hardening_3_status_output_deep_contract
hardening_batch_4_10:
  status: ready
  source_artifact: vac-source-tui-operator-ui-hardening4-10.zip
  capabilities:
  - vac.tui.capability-dashboard-runtime
  - vac.tui.agent-streaming-runtime
  - vac.tui.approval-popup-safety
  - vac.autopilot.scheduler-monitor-only
  - vac.tui.operator-visual-fidelity-matrix
  - vac.tui.spec-driven-consolidation
  - vac.tui.source-artifact-hygiene
  validation:
  - bash scripts/check-tui-hardening-4-10-contract.sh

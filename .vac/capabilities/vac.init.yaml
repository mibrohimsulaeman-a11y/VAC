schema_version: 1
kind: capability
id: vac.init
title: VAC-Init Engine (scan, synth, doctor)
status: ready
# Consolidates the former vac.init.* family (~25 manifests) into ONE capability.
# Sub-areas are scopes, not separate files.
scopes:
  - cli-runtime-foundation
  - ownership-scanner
  - risk-policy
  - policy-evaluator
  - patch-guard
  - command-gate
  - evidence-chain
  - semantic-plan
  - schema-envelope
  - doctor-release
ownership:
  annotation: vac.init
  paths:
    include:
      - "vac-rs/crates/capabilities/ownership/**"
      - "vac-rs/crates/surfaces/cli/**"
      - "vac-rs/crates/control-plane/control-plane/**"
    exclude:
      - "**/target/**"
policy:
  risk: medium
  mutates_files: true
  network: false
  approval_required_for: [filesystem_write, filesystem_delete, execute_process]
depends_on: [vac.architecture, vac.workflow]

schema_version: 1
kind: capability
id: vac.init.schema-envelope
title: VAC-Init Schema Envelope and Kind Registry
status: ready
owner:
  crate: vac-core
  module: control_plane::schema_envelope
ownership:
  crates:
  - vac-core
  modules:
  - control_plane::schema_envelope
  - control_plane::kind_registry
  targets:
  - crate_name: vac-core
    module: control_plane::schema_envelope
  - crate_name: vac-core
    module: control_plane::kind_registry
description: Dependency-free VAC-Init registry foundation that validates schema_version/kind/id envelopes and exposes the v1-alpha manifest kind registry for later typed loaders and doctor gates.
depends_on:
- vac.workflow
surfaces:
  cli:
    enabled: true
    commands:
    - bash scripts/check-vac-init-schema-envelope-contract.sh
  palette: true
  tui:
    routes:
    - /init/schema-envelope
policy:
  risk: safe_read
  mutates_files: false
  network: false
  redaction: false
  approval_required_for: []
states:
- empty
- loading
- success
- failure
validation:
  commands:
  - id: vac.init.schema-envelope.validation.cmd001
    runner: bash
    args:
    - scripts/check-vac-init-schema-envelope-contract.sh
    risk: execute_process
    approval: policy
  - id: vac.init.schema-envelope.validation.cmd002
    runner: bash
    args:
    - scripts/check-vac-init-baseline-contract.sh
    risk: execute_process
    approval: policy
  gates:
  - vac_init_schema_envelope_contract
  - vac_init_kind_registry_contract
  - vac_init_baseline_audit_contract

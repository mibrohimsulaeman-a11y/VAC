schema_version: 1
kind: capability
id: vac.donor_migration
title: Donor migration checks
status: ready
owner:
  crate: vac-surface-cli
  module: doctor_cli
description: Declarative donor cleanup, reachability, evidence, and commit-phrase checks for donor/vac.
reason: 'Donor migration checks are a ready safety gate: donor metadata validation, granular workflow steps, CLI doctor route, evidence checks, and root seed coverage are wired. Individual donor code migration/deletion remains tracked by donor lifecycle metadata, not by this gate capability status.

  '
depends_on:
- vac.workflow
- vac.ownership
surfaces:
  cli:
    enabled: true
    commands:
    - vac doctor donor
  palette: true
donor_source:
  source: donor/vac
  root_target: vac-rs/cli/src/doctor_cli.rs
  cleanup_status: donor_only
states:
- empty
- loading
- success
- failure
policy:
  risk: safe_read
  mutates_files: false
  network: false
  redaction: false
  approval_required_for:
  - execute_process
validation:
  commands:
  - id: vac.donor-migration.validation.cmd001
    runner: bash
    args:
    - scripts/check-donor-status.sh
    - inventory
    risk: execute_process
    approval: policy
  - id: vac.donor-migration.validation.cmd002
    runner: bash
    args:
    - scripts/check-donor-status.sh
    - drift
    risk: execute_process
    approval: policy
  - id: vac.donor-migration.validation.cmd003
    runner: bash
    args:
    - scripts/check-donor-status.sh
    - manifest
    risk: execute_process
    approval: policy
  - id: vac.donor-migration.validation.cmd004
    runner: bash
    args:
    - scripts/check-donor-status.sh
    - contracts
    risk: execute_process
    approval: policy
  - id: vac.donor-migration.validation.cmd005
    runner: bash
    args:
    - scripts/check-donor-status.sh
    - reachability
    risk: execute_process
    approval: policy
  - id: vac.donor-migration.validation.cmd006
    runner: bash
    args:
    - scripts/check-donor-status.sh
    - evidence
    risk: execute_process
    approval: policy
  - id: vac.donor-migration.validation.cmd007
    runner: bash
    args:
    - scripts/check-donor-status.sh
    - commit-phrase
    risk: execute_process
    approval: policy
  - id: vac.donor-migration.validation.cmd008
    runner: bash
    args:
    - scripts/check-donor-status.sh
    - plan11-hermes
    risk: execute_process
    approval: policy
ownership:
  crates:
  - vac-cli
  modules:
  - doctor_cli
docs:
- .vac/registry/donor-inventory.yaml

schema_version: 1
kind: capability
id: vac.autopilot.scheduler-monitor-only
title: Autopilot Scheduler Monitor-Only Safety Contract
status: ready
owner:
  crate: vac-surface-tui
  module: operator_ui
description: Hardening layer that keeps runtime jobs/autopilot visible as a monitor/control surface while requiring approval policy for retry, cancel, attach, write, execute, and destructive task effects.
depends_on:
- vac.autopilot.scheduler
surfaces:
  tui:
    routes:
    - /runtime/monitor-only
states:
- empty
- loading
- success
- failure
policy:
  risk: safe_read
  mutates_files: false
  network: false
  redaction: true
  approval_required_for:
  - retry_task
  - cancel_task
  - attach_session
  - execute_process
  - write_files
  - destructive_task
validation:
  commands:
  - id: vac.autopilot.scheduler-monitor-only.validation.cmd001
    runner: bash
    args:
    - scripts/check-autopilot-scheduler-monitor-only-contract.sh
    risk: execute_process
    approval: policy
  gates:
  - monitor_only_label
  - policy_gated_actions
  - no_destructive_execution_without_approval
ownership:
  crates:
  - vac-tui
  modules:
  - operator_ui
  targets:
  - kind: module
    crate: vac-surface-tui
    module: operator_ui
  - kind: path
    include:
    - .vac/capabilities/autopilot-scheduler-monitor-only.yaml
    - scripts/check-autopilot-scheduler-monitor-only-contract.sh
    exclude: []

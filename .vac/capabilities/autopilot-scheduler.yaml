schema_version: 1
kind: capability
id: vac.autopilot.scheduler
title: Autopilot Scheduler Runtime Jobs
status: ready
owner:
  crate: vac-surface-tui
  module: operator_ui
ownership:
  crates:
  - vac-tui
  modules:
  - operator_ui
description: Spec-driven runtime jobs executor and monitor for scheduled/autopilot workflows in the local terminal TUI.
reason: 'The scheduler surface is backed by declarative `.vac` workflow manifests,

  a workflow_runner-backed executor, run-state dedupe, approval-policy binding for real registries,

  persistent status/run/action logs, and a TUI operator console whose draw path is read-only.

  Runtime actions can cancel future runs, retry through workflow_runner, or inspect/attach to run logs

  without bypassing destructive approval policy or executing work from render ticks.

  '
depends_on:
- vac.tui
- vac.workflow
surfaces:
  tui:
    routes:
    - /runtime
    - /runtime/jobs
  slash:
    commands:
    - /runtime
  palette: true
states:
- empty
- loading
- running
- queued
- ok
- failed
- cancelled
- blocked_approval
policy:
  risk: safe_read
  mutates_files: false
  network: false
  redaction: true
  approval_required_for:
  - execute_process
  - write_files
  - destructive_task
validation:
  commands:
  - id: vac.autopilot.scheduler.validation.cmd001
    runner: bash
    args:
    - scripts/check-autopilot-scheduler-contract.sh
    risk: execute_process
    approval: policy
  - id: vac.autopilot.scheduler.validation.cmd002
    runner: bash
    args:
    - scripts/check-tui-operator-snapshot-contract.sh
    risk: execute_process
    approval: policy
  gates:
  - manifest_registered
  - runtime_route_registered
  - slash_route_registered
  - palette_route_registered
  - workflow_registered
  - policy_gated_workflow_runner
  - render_path_read_only
docs:
- docs/vac-init/VAC_INIT_PRODUCTION_HARDENING_A.md

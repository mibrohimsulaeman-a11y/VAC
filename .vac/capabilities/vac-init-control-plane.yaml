  - vac_init_batch6_12_contract
  - source_artifact_hygiene
  commands:
  - id: vac.init.control-plane.validation.cmd001
    runner: bash
    args:
    - scripts/check-vac-init-schema-envelope-contract.sh
    risk: execute_process
    approval: policy
  - id: vac.init.control-plane.validation.cmd002
    runner: bash
    args:
    - scripts/check-vac-init-baseline-contract.sh
    risk: execute_process
    approval: policy
  - id: vac.init.control-plane.validation.cmd003
    runner: bash
    args:
    - scripts/check-vac-init-batch2-5-contract.sh
    risk: execute_process
    approval: policy
  - id: vac.init.control-plane.validation.cmd004
    runner: bash
    args:
    - scripts/check-vac-init-batch6-12-contract.sh
    risk: execute_process
    approval: policy

    - bash scripts/check-vac-init-batch6-12-contract.sh
  palette: true
  tui:
    routes:
    - /vac-init
states:
- empty
- loading
- success
- failure
policy:
  risk: safe_read
  mutates_files: false
  network: false
  redaction: false
  approval_required_for:
  - filesystem_write
  - execute_process
validation:

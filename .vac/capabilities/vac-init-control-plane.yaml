schema_version: 1
kind: capability
id: vac.init.control-plane
title: VAC-Init Engine and Workflow Control Plane Foundation
status: ready
owner:
  crate: vac-core
  module: control_plane::schema_envelope
ownership:
  crates:
  - vac-core
  modules:
  - control_plane::schema_envelope
  - control_plane::kind_registry
  targets:
  - crate_name: vac-core
    module: control_plane::schema_envelope
  - crate_name: vac-core
    module: control_plane::kind_registry
reason: Control-plane foundation is ready. Schema envelope, kind registry, execution plan, baseline gate, lifecycle, scanners, policy evaluator, command gate, approval replay protection, evidence chain, and why surfaces are now represented by dedicated ready capabilities and validation gates.
description: Manifest-first foundation for turning repositories into VAC-controlled agentic workspaces.
depends_on:
- vac.workflow
surfaces:

schema_version: 1
kind: capability
id: vac.docs.plan-reconciliation
title: Docs Plan Codebase Reconciliation
status: ready
owner:
  crate: vac-core
  module: control_plane::docs_maintenance
ownership:
  crates:
  - vac-core
  modules:
  - control_plane::docs_maintenance
  targets:
  - kind: path
    include:
    - docs/workflow-control-plane/plans/*.md
    - docs/donor-migration/domain-plans/*.md
    - .vac/registry/plan-state.yaml
    - scripts/check-plan-codebase-reconciliation.sh
    exclude: []
description: Reconciles primary docs plans against current codebase evidence, .vac manifests, and donor domain contract state.
depends_on:
- vac.docs.state-refresh
- vac.init.registry-strictness
- vac.donor_migration
surfaces:
  cli:
    enabled: true
    commands:
    - bash scripts/check-plan-codebase-reconciliation.sh
policy:
  risk: safe_read
  mutates_files: false
  network: false
  redaction: false
  approval_required_for: []
states:
- empty
- loading
- success
- failure
validation:
  gates:
  - docs_plan_codebase_reconciliation
  commands:
  - id: vac.docs.plan-reconciliation.validation.cmd001
    runner: bash
    args:
    - scripts/check-plan-codebase-reconciliation.sh
    risk: execute_process
    approval: policy

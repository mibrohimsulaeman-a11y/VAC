schema_version: 1
kind: capability
id: vac.tui_session_runtime
title: TUI Session Runtime
status: ready
owner: vac-surface-tui/local_runtime_session
ownership:
  crates:
  - vac-tui
  modules:
  - app_server_session
  - local_runtime_session
  targets:
  - crate_name: vac-tui
    module: app_server_session
  - crate_name: vac-tui
    module: local_runtime_session
description: TUI session-runtime boundary with owner-native default DTO ownership and a non-default legacy client transport quarantine.
reason: 'The default TUI session DTO and operation path resolves through owner-native runtime protocol and local-runtime-owner parity. Optional legacy app-server client transport remains quarantined behind non-default compatibility metadata only.

  '
depends_on:
- vac.local_runtime_owner
- vac.tui
optional_depends_on:
- vac.runtime_approval_bridge
runtime_events:
- tui_session_bootstrap
- tui_session_event_bridge
surfaces:
  palette: true
states:
  empty: Runtime route not selected
  loading: Runtime bridge starting
  success: Runtime bridge active
  failure: Runtime bridge failed
policy:
  risk: safe_read
  mutates_files: false
  network: false
  redaction: false
validation:
  commands:
  - id: vac.tui-session-runtime.validation.cmd001
    runner: cargo
    args:
    - +1.93.0
    - check
    - -p
    - vac-tui
    risk: execute_process
    approval: policy
  gates: []
compatibility_transport:
- dependency: vac_app_server_client optional legacy transport
  status: compatibility_transport
  owner: vac-surface-tui/local_runtime_session
  quarantine_marker: 'VAC_RUNTIME_OWNER_COMPAT_DEFER: plan31-app-server-compat-quarantine'
  deletion_condition: A future deletion slice removes the optional legacy client transport after non-default rollback evidence is no longer required.
  replacement: vac-rs/crates/surfaces/tui/src/local_runtime_session.rs plus vac-rs/crates/capabilities/local-runtime-owner request and event DTOs.
  target_removal_plan: pruned legacy plan archive; see docs/workflow-control-plane/plans/INDEX.md

description: Root interactive chat surface.
reason: 'Chat root TUI/CLI surfaces, slash commands, owner metadata, and validation are now represented by the root capability manifest. Root source paths are synchronized in the Plan 19 catalog; future chat polish is feature work, not a control-plane readiness blocker.

  '

schema_version: 1
kind: capability
id: vac.tui.status-output
title: TUI status output hardening
status: ready
owner:
  crate: vac-surface-tui
  module: status
ownership:
  crates:
  - vac-tui
  modules:
  - status
  - status/output_contract
  - token_usage
description: Hardened /status surface that keeps active model, always-visible active provider, optional multi-provider registry, token/context/directory/permissions detail while omitting legacy rate-limit and credit display rows through a dedicated status output contract. /status is local-only and must not emit account limit or credit refresh requests.
depends_on:
- vac.tui
surfaces:
  cli:
    enabled: true
    commands:
    - bash scripts/check-tui-status-output-contract.sh
  slash:
    commands:
    - /status
states:
- empty
- loading
- success
- failure
policy:
  risk: safe_read
  mutates_files: false
  network: false
  redaction: false
validation:
  commands:
  - id: vac.tui.status-output.validation.cmd001
    runner: bash
    args:
    - scripts/check-tui-status-output-contract.sh
    risk: execute_process
    approval: policy
  - id: vac.tui.status-output.validation.cmd002
    runner: bash
    args:
    - scripts/check-tui-status-deep-hardening-contract.sh
    risk: execute_process
    approval: policy
  - id: vac.tui.status-output.validation.cmd003
    runner: bash
    args:
    - scripts/check-tui-status-output-rustc-contract.sh
    risk: execute_process
    approval: policy
  gates:
  - no_visit_rate_limit_credit_display
  - token_usage_and_context_window_visible
  - model_provider_directory_permissions_visible
  - default_vastar_provider_not_hidden
  - model_providers_registry_row_available
  - semantic_status_display_fields
  - provider_model_usage_rows_validate_active_model
  - status_display_field_contract_registered
  - multi_provider_model_usage_contract_available
  - status_command_local_only_no_refresh_event
  - cached_account_limits_not_passed_to_status_card
  - status_display_policy_rejects_quota_balance_rows
  - slash_status_asserts_local_only_policy
  - ambient_limit_warnings_not_routed_to_status_breakdown

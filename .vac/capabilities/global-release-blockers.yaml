schema_version: 1
kind: capability
id: vac.release.legal-build-blockers
title: Legal and Build Release Blockers
status: ready
owner:
  crate: vac-core
  module: control_plane::registry
ownership:
  crates:
  - vac-core
  modules:
  - control_plane::registry
  targets:
  - kind: path
    include:
    - THIRD_PARTY_NOTICES.md
    - docs/legal/**
    - .vac/registry/legal-release-blockers.yaml
    - scripts/check-legal-release-blockers.sh
    exclude: []
description: Tracks P0 release blockers for legal attribution and build truth without converting unrun gates to Pass.
depends_on:
- vac.init.registry-strictness
policy:
  risk: safe_read
  mutates_files: false
  network: false
  redaction: false
  approval_required_for: []
surfaces:
  cli:
    enabled: true
    commands:
    - bash scripts/check-legal-release-blockers.sh
states:
- empty
- loading
- success
- failure
validation:
  gates:
  - legal_release_blockers
  commands:
  - id: vac.release.legal-build-blockers.validation.cmd001
    runner: bash
    args:
    - scripts/check-legal-release-blockers.sh
    risk: execute_process
    approval: policy
docs:
- THIRD_PARTY_NOTICES.md

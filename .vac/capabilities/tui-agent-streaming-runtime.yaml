schema_version: 1
kind: capability
id: vac.tui.agent-streaming-runtime
title: TUI Agent Streaming Runtime Contract
status: ready
owner:
  crate: vac-surface-tui
  module: operator_ui
description: Conversation timeline, turn metadata, thinking/status line, context usage bar, composer retention, and last-five tool timeline model for active agent turns.
depends_on:
- vac.tui
- vac.tui.operator-live-adapter
surfaces:
  tui:
    routes:
    - /agent-streaming
states:
- empty
- loading
- success
- failure
policy:
  risk: safe_read
  mutates_files: false
  network: false
  redaction: true
validation:
  commands:
  - id: vac.tui.agent-streaming-runtime.validation.cmd001
    runner: bash
    args:
    - scripts/check-tui-agent-streaming-runtime-contract.sh
    risk: execute_process
    approval: policy
  gates:
  - conversation_timeline
  - turn_metadata
  - context_usage_bar
  - tool_timeline_last_five
ownership:
  crates:
  - vac-tui
  modules:
  - operator_ui
  targets:
  - kind: module
    crate: vac-surface-tui
    module: operator_ui
  - kind: path
    include:
    - .vac/capabilities/tui-agent-streaming-runtime.yaml
    - scripts/check-tui-agent-streaming-runtime-contract.sh
    exclude: []

schema_version: 1
kind: capability
id: vac.identity
title: Identity
status: ready
ownership:
  annotation: vac.identity
  paths:
    include:
      - "vac-rs/crates/capabilities/identity/**"
      - "vac-rs/crates/providers/agent-identity/**"
      - "vac-rs/crates/providers/login/**"
    exclude:
      - "**/target/**"
notes:
  - Provider-http transport belongs to vac.runtime, not identity; identity owns auth/login only.
policy:
  risk: low
  mutates_files: false
  network: true
  approval_required_for: [network_access]
depends_on: [vac.runtime]

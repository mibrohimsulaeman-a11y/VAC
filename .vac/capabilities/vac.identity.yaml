schema_version: 2
kind: capability
id: vac.identity
title: Identity
status: ready
ownership:
  annotation: vac.identity
  paths:
    include:
      - "vac-rs/crates/capabilities/identity/**"
      - "vac-rs/crates/providers/agent-identity/**"
      - "vac-rs/crates/providers/login/**"
    exclude:
      - "**/target/**"
notes:
  - v1 mis-scoped all of provider-http under identity. In v2, HTTP/provider transport belongs to vac.runtime; identity owns auth/login only.
policy:
  risk: low
  mutates_files: false
  network: true
  approval_required_for: [network_access]
depends_on: [vac.runtime]

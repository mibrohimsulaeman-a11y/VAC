schema_version: 1
kind: capability
id: vac.docs.state-refresh
title: VAC Documentation State Refresh
status: ready
owner:
  crate: vac-core
  module: control_plane::docs_maintenance
ownership:
  crates:
  - vac-core
  modules:
  - control_plane::docs_maintenance
  targets:
  - kind: path
    include:
    - .vac/registry/docs-state.yaml
    - scripts/check-docs-state-refresh.sh
    exclude: []
description: Documentation corpus scan and current state refresh generated from all docs/**/*.md files and live .vac manifests.
depends_on:
- vac.workflow
- vac.init.registry-strictness
- vac.init.memory-governance
surfaces:
  cli:
    enabled: true
    commands:
    - bash scripts/check-docs-state-refresh.sh
policy:
  risk: safe_read
  mutates_files: false
  network: false
  redaction: false
  approval_required_for: []
states:
- empty
- loading
- success
- failure
validation:
  gates:
  - docs_state_refresh
  commands:
  - id: vac.docs.state-refresh.validation.cmd001
    runner: bash
    args:
    - scripts/check-docs-state-refresh.sh
    risk: execute_process
    approval: policy

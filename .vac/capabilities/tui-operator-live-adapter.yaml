schema_version: 1
kind: capability
id: vac.tui.operator-live-adapter
title: TUI operator live adapter
status: ready
owner:
  crate: vac-surface-tui
  module: operator_ui_styles
ownership:
  crates:
  - vac-tui
  modules:
  - operator_ui
  - operator_style
  - operator_ui_styles
description: Ratatui adapter that maps deterministic operator-console render lines into styled live TUI lines.
depends_on:
- vac.tui
- vac.tui.ansi-style
- vac.autopilot.scheduler
surfaces:
  tui:
    routes:
    - /capabilities
    - /runtime
  slash:
    commands:
    - /capabilities
    - /runtime
  palette: true
policy:
  risk: safe_read
  mutates_files: false
  network: false
  redaction: false
validation:
  commands:
  - id: vac.tui.operator-live-adapter.validation.cmd001
    runner: bash
    args:
    - scripts/check-tui-operator-live-adapter.sh
    risk: execute_process
    approval: policy
  - id: vac.tui.operator-live-adapter.validation.cmd002
    runner: bash
    args:
    - scripts/check-tui-operator-snapshot-contract.sh
    risk: execute_process
    approval: policy
  - id: vac.tui.operator-live-adapter.validation.cmd003
    runner: bash
    args:
    - scripts/check-tui-operator-ansi-contract.sh
    risk: execute_process
    approval: policy
  gates:
  - runtime_surface_uses_adapter
  - capability_surface_uses_adapter
  - deterministic_renderer_preserved
docs:
- docs/vac-init/VAC_INIT_PRODUCTION_HARDENING_A.md

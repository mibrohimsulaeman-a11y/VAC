schema_version: 1
kind: capability
id: vac.local_runtime_owner
title: Local Runtime Owner
status: ready
owner: vac-rs/local-runtime-owner
ownership:
  crates:
  - vac-local-runtime-owner
  - vac-core
  modules:
  - local_runtime
  - retained_resources
  - session
  targets:
  - crate_name: vac-local-runtime-owner
    module: lib
  - crate_name: vac-local-runtime-owner
    module: command_bus
  - crate_name: vac-local-runtime-owner
    module: event_stream
  - crate_name: vac-local-runtime-owner
    module: external_agent_config
  - crate_name: vac-local-runtime-owner
    module: plugin_surface
  - crate_name: vac-local-runtime-owner
    module: retained_resources
  - crate_name: vac-local-runtime-owner
    module: server_requests
  - crate_name: vac-local-runtime-owner
    module: session
  - crate_name: vac-local-runtime-owner
    module: shutdown
  - crate_name: vac-local-runtime-owner
    module: startup
description: Pre-gate local runtime owner boundary for retained resources, owner-owned command dispatch, and neutral bootstrap data.
reason: 'The default TUI product path is owner-native: retained resources, command bus, startup/bootstrap, prompt/control operation parity, server-request policy, and release non-pass PTY semantics are documented and gated. Legacy app-server compatibility has been retired from the product path; provider cloud/API access remains intentionally outside this local-runtime boundary.

  '
depends_on:
- vac.workflow
- vac.sessions
optional_depends_on:
- vac.tui_session_runtime
- vac.runtime_approval_bridge
runtime_events:
- retained_resources_bootstrap
- command_bus_dispatch
surfaces:
  palette: true
states:
  empty: Owner boundary declared
  loading: Owner evidence loading
  success: Owner boundary healthy
  failure: Owner boundary needs attention
policy:
  risk: safe_read
  mutates_files: false
  network: false
  redaction: false
runtime_support:

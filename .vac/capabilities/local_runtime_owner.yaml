    runner: cargo
    args:
    - +1.95.0
    - check
    - -p
    - vac-local-runtime-owner
    risk: execute_process
    approval: policy
  - id: vac.local-runtime-owner.validation.cmd002
    runner: cargo
    args:
    - +1.95.0
    - test

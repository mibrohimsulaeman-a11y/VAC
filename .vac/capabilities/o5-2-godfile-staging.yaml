schema_version: 1
kind: capability
id: vac.monolith.godfile-staging
title: O5.2 God-file semantic source split
status: ready
owner:
  crate: vac-surface-tui
  module: chatwidget
ownership:
  crates:
  - vac-tui
  modules:
  - chatwidget
  targets:
  - kind: path
    include:
    - vac-rs/tui/src/chatwidget.rs
    - vac-rs/tui/src/chatwidget/split_manifest.yaml
    - docs/monolith-quality/O5_2_SEMANTIC_SOURCE_SPLIT.md
    - scripts/check-vac-o5-2-godfile-staging.sh
    exclude: []
description: Ordered semantic source shards replacing former full-byte legacy_include.rs staging while preserving parent module paths until cargo TV validates deeper extraction.
depends_on:
- vac.o5-o6.monolith-quality
policy:
  risk: medium
  mutates_files: true
  network: false
  redaction: false
  approval_required_for:
  - filesystem_write
surfaces:
  cli:
    enabled: true
    commands:
    - bash scripts/check-vac-o5-2-godfile-staging.sh
  palette: true
  tui:
    routes:
    - /doctor
    - /release
states:
- empty
- loading
- success
- failure
validation:
  gates:
  - o5_2_godfile_staging
  commands:
  - id: vac.monolith.godfile-staging.validation.cmd001
    runner: bash
    args:
    - scripts/check-vac-o5-2-godfile-staging.sh
    risk: execute_process
    approval: policy
docs:
- docs/monolith-quality/O5_2_SEMANTIC_SOURCE_SPLIT.md

schema_version: 1
kind: capability
id: vac.docs
title: Docs
status: ready
owner:
  crate: vac-capability-docs
  module: contract
ownership:
  crates:
  - vac-capability-docs
  - vac-capability-docs
  modules:
  - contract
  targets:
  - kind: path
    include:
    - docs/**
    - .vac/registry/docs-state.yaml
    exclude: []
description: Static ownership boundary for documentation-domain capability extracted from vac-core monolith.
depends_on: []
policy:
  risk: low
  mutates_files: true
  network: false
  redaction: false
  approval_required_for:
  - filesystem_write
surfaces:
  cli:
    enabled: true
    commands:
    - vac doctor docs
states:
- empty
- loading
- success
- failure
validation:
  gates:
  - capability_docs_static_boundary
  commands:
  - id: vac.docs.validation.cmd001
    runner: bash
    args:
    - scripts/check-vac-o5o6-zero-residual-static.sh
    risk: execute_process
    approval: policy

description: Typed workflow manifests, registry loading, and diagnostics.
reason: 'Workflow manifests, safe-runner vocabulary, doctor surfaces, policy/approval hooks, and validation are synchronized with the root capability catalog. Future workflow UX polish is feature work, not a control-plane readiness blocker.

  '
depends_on:
- vac.sessions
surfaces:

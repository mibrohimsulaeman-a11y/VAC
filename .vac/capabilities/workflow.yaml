    commands:
    - /autoreview
    - /capabilities
    - /goal
    - /hooks
    - /plan
    - /skills
    - /workflow
  cli:
    enabled: true
    commands:
    - vac completion
    - vac doctor
    - vac doctor docs
    - vac doctor policy
    - vac doctor registry
    - vac doctor surfaces
    - vac doctor workflow
  palette: true
states:
- empty
- loading
- success
- failure

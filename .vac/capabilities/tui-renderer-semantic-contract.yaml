  mutates_files: false
  network: false
  redaction: false
validation:
  commands:
  - id: vac.tui.renderer-semantic-contract.validation.cmd001
    runner: bash
    args:
    - scripts/check-tui-renderer-semantic-contract.sh
    risk: execute_process
    approval: policy
  - id: vac.tui.renderer-semantic-contract.validation.cmd002
    runner: bash
    args:
    - scripts/check-tui-operator-ansi-contract.sh
    risk: execute_process
    approval: policy
  - id: vac.tui.renderer-semantic-contract.validation.cmd003
    runner: bash
    args:
    - scripts/check-tui-operator-live-adapter.sh
    risk: execute_process
    approval: policy
  gates:
  - semantic_line_span_specs
  - ansi_strip_round_trip
  - live_adapter_uses_specs

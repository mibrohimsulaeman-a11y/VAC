schema_version: 1
kind: capability
id: vac.tui.renderer-semantic-contract
title: TUI renderer semantic contract
status: ready
owner:
  crate: vac-surface-tui
  module: operator_ui
ownership:
  crates:
  - vac-tui
  modules:
  - operator_ui
  - operator_style
  - operator_ui_styles
description: Semantic line/span render contract for operator-console snapshots, ANSI snapshots, and live ratatui adapter wiring.
depends_on:
- vac.tui
- vac.tui.ansi-style
- vac.tui.operator-live-adapter
surfaces:

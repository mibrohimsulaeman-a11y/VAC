schema_version: 1
kind: capability
id: vac.tui.approval-popup-safety
title: TUI Approval Popup Safety Contract
status: ready
owner:
  crate: vac-surface-tui
  module: bottom_pane.approval_overlay
description: Explicit approval risk and safety context renderer for destructive/write/network operations; UI displays policy decisions but never bypasses approval policy.
depends_on:
- vac.tui
- vac.approvals
surfaces:
  tui:
    routes:
    - /approvals
  palette: false
policy:
  risk: approval_required
  mutates_files: false
  network: false
  redaction: true
  approval_required_for:
  - execute_process
  - write_files
  - destructive_task
validation:
  commands:
  - id: vac.tui.approval-popup-safety.validation.cmd001
    runner: bash
    args:
    - scripts/check-tui-approval-popup-safety-contract.sh
    risk: execute_process
    approval: policy
  gates:
  - explicit_approval_risk
  - destructive_label
  - policy_gate_summary
  - no_ui_policy_bypass
docs:
- docs/vac-init/VAC_INIT_PRODUCTION_HARDENING_A.md
ownership:
  crates:
  - vac-tui
  modules:
  - bottom_pane.approval_overlay
  targets:
  - kind: module
    crate: vac-surface-tui
    module: bottom_pane.approval_overlay
  - kind: path
    include:
    - .vac/capabilities/tui-approval-popup-safety.yaml
    - docs/vac-init/VAC_INIT_PRODUCTION_HARDENING_A.md
    - scripts/check-tui-approval-popup-safety-contract.sh
    exclude: []

schema_version = 2

[workspace]
id = "vac"
root = "."

# Anti-bloat: the control plane is subject to its own zero-bloat discipline.
# Counts ONLY hand-authored manifests (excludes derived/ and cache/).
[budget.authored]
max_files = 40
max_lines = 4000
enforced_by = "vac doctor budget ."

[paths]
authored = ["capabilities", "policies", "surfaces", "workflows", "ledger"]
derived  = "derived"   # git-ignored, regenerated by `vac scan`
cache    = "cache"     # git-ignored, transient
evidence = "evidence"  # append-only, runner-emitted ONLY

[gates]
# Binary only. A gate that has not run is treated as failing.
mode = "binary"
unknown_is = "fail"
waivers = "ledger/waivers.yaml"

[evidence]
# Evidence may only be written by the gate/command runner, never by the agent.
author = "runner_only"
signing_key_env = "VAC_EVIDENCE_ED25519_SIGNING_KEY_BASE64"
required_env = "VAC_EVIDENCE_SIGNING_REQUIRED"
unsigned_behavior = "warn_when_optional_fail_closed_when_required"

[ci]
# Validation is delegated to GitHub Actions, never run locally.
provider = "github-actions"
repo = "mibrohimsulaeman-a11y/VAC"
workflow_file = ".github/workflows/ci.yml"
workflow_name = "Rust CI"
toolchain = "1.95.0"
working_directory = "vac-rs"
profile = "ci-test"
local_cargo = "forbidden"

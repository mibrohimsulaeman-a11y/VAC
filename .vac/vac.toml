# VAC workspace control-plane root config
[workspace]
id = "vac.workspace.agent-main-migration"
name = "VAC"
control_plane_version = "1.9"
rust_workspace = "vac-rs"
conformance_level = "L1"

[authority]
authoring = "yaml"
runtime = "compiled_json"
audit = "jcs_json"
manifest_set_hash = "computed_from_authority_manifests"

[storage]
authority = ".vac/{capabilities,policies,workflows,surfaces,specs/confirmed,schemas,migrations}"
runtime_journal = ".vac/db/runtime.db"
compiled_cache = ".vac/cache/compiled"
exports = ".vac/exports"
generated_source_policy = "ignored_by_default"

[registry]
compiled = ".vac/cache/compiled"
status = ".vac/registry/status.json"
runtime_jobs = ".vac/registry/runtime/jobs.json"

[trust]
level = "L1"
execution = "observed_l1"
custody = "local_only"
claim = "local cooperative governance for VAC-managed actions only"

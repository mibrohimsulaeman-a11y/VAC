    ownership: vac.autopilot.scheduler
    semantic_anchor:
      kind: audit_finding
      symbol: autopilot.workflow_runner_executor
    rationale: Drive scheduled workflow manifests through execute_workflow_manifest, write running and terminal job states, and persist run evidence.
  - path: vac-rs/tui/src/operator_console.rs
    operation: modify
    ownership: vac.tui.runtime-surface
    semantic_anchor:
      kind: audit_finding
      symbol: operator_console.live_tabs_and_refresh

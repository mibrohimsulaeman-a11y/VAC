status: implemented_static
updated_at: '2026-06-01T00:00:00Z'
title: O5/O6 TUI performance hot-path closeout
summary: Separate operator-console draw ticks from autopilot workflow execution, make runtime view refresh dirty-checked/read-only, memoize repeated markdown renders, and harden gates against performance regressions.
task:
  description: Fix the latest TUI performance audit findings without claiming cargo/live TV in this sandbox.
  capability: vac.tui.operator-live-adapter
allowed_files:
  - path: vac-rs/tui/src/operator_console.rs
    operation: modify
    ownership: vac.tui
    semantic_anchor:
      kind: audit_finding
      symbol: operator_console.draw_tick_read_only_dirty_refresh
    rationale: Make pre_draw_tick poll persisted status signatures and redraw only when content changes; never execute scheduler from draw.
  - path: vac-rs/tui/src/operator_ui.rs
    operation: modify
    ownership: vac.tui
    semantic_anchor:
      kind: audit_finding
      symbol: autopilot_state_loader_read_only
    rationale: Keep AutopilotSchedulerState::from_workspace read-only so render/model construction cannot spawn workflow execution.
  - path: vac-rs/tui/src/markdown_render.rs
    operation: modify
    ownership: vac.tui
    semantic_anchor:
      kind: audit_finding
      symbol: markdown_render_memo_cache
    rationale: Memoize repeated markdown renders by source, width, and cwd to reduce transcript redraw/reparse cost.
  - path: scripts/check-vac-control-plane-audit-findings-static.sh
    operation: modify
    ownership: vac.quality-gates
    semantic_anchor:
      kind: audit_finding
      symbol: performance_hotpath_static_gate
    rationale: Reject regressions where TUI draw/render paths execute the autopilot scheduler or unconditional refresh loops return true.
  - path: scripts/check-vac-o6-1-depanic-surface.sh
    operation: modify
    ownership: vac.quality-gates
    semantic_anchor:
      kind: audit_finding
      symbol: o6_1_depanic_surface.performance_hotpath_skip_repin
    rationale: Keep aggregate skip-rescan expectations aligned with the reproduced O6.1 scanner output.
  - path: .vac/capabilities/autopilot-scheduler.yaml
    operation: modify
    ownership: vac.autopilot.scheduler
    semantic_anchor:
      kind: audit_finding
      symbol: autopilot_scheduler_capability_truth_refresh
    rationale: Update stale monitor-only capability language to reflect workflow_runner-backed execution plus draw/read separation truth.
  - path: .vac/registry/o6-panic-surface.yaml
    operation: modify
    ownership: vac.quality-gates
    semantic_anchor:

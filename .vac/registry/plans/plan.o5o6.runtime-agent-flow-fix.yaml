schema_version: 1
kind: plan
id: plan.o5o6.runtime-agent-flow-fix
status: implemented_static
updated_at: '2026-06-01T00:00:00Z'
title: O5/O6 runtime entrypoints and agent flow fix
summary: >
  Close the runtime audit blockers for interactive vac startup/turn execution,
  runtime Plan Mode semantic validation, command/evidence gate anchoring, and
  vac init doctor readiness semantics. The Plan Mode fix intentionally uses the
  shared vac plan validate engine in the existing runtime turn path, rather than
  keeping plan validation as a separate capability path.
task:
  description: >
    Replace critical owner-native unsupported stubs with ThreadManager-backed
    startup, turn, steer, interrupt, shell, compact, background terminal cleanup,
    and event forwarding paths; integrate runtime Plan Mode with the shared
    vac init plan validation engine before Op::UserTurn; add static guard rails
    against unsupported critical owner methods; and make vac init write a real
    doctor report instead of the pending_runtime_cli placeholder.
  capability: vac.local_runtime_owner

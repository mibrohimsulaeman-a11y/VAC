title: O5/O6 runtime agent flow structural hardening
summary: >
  Continue the runtime-agent-flow auditfix by replacing the last brittle support
  inference with a code-owned owner-native runtime support contract, aligning the
  operation parity registry with non-critical fail-closed controls, and keeping
  registry validator preflight deterministic in no-rustc sandboxes.
task:
  description: >
    Harden the runtime owner support contract after the auditfix slice without
    creating a separate Plan Mode path. Runtime Plan Mode remains fail-closed on
    the shared semantic plan validation engine used by vac plan validate.
  capability: vac.local_runtime_owner

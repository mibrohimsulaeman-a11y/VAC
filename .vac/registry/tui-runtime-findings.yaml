source_closures:
  CL-1:
    status: pass_static
    root_cause: CellHeightKey.style_revision previously derived from last_rendered_width, duplicating width and missing theme/style invalidation.
    fix:
      - added ChatWidget style_epoch
      - set CellHeightKey.style_revision from style_epoch
      - bump style_epoch on /theme changes and status-line theme-color changes
      - clear height cache on style_epoch changes
    source:
      - vac-rs/crates/surfaces/tui/src/chatwidget/split_002_new.rs
      - vac-rs/crates/surfaces/tui/src/chatwidget/chatwidget_group_014_impl.rs
      - vac-rs/crates/surfaces/tui/src/chatwidget/chatwidget_group_020_impl.rs
      - vac-rs/crates/surfaces/tui/src/chatwidget/chatwidget_group_025_epilogue.rs
  CL-2:
    status: pass_static
    root_cause: per-cell height BTreeMap had no entry cap or stale revision pruning.
    fix:
      - HEIGHT_CACHE_MAX_ENTRIES: 4096
      - HEIGHT_CACHE_MAX_REVISIONS_PER_CELL: 3
      - FIFO eviction plus stale revision pruning
      - metrics for entries, evictions, and stale_revision_pruned
    source:
      - vac-rs/crates/surfaces/tui/src/chatwidget/height_cache.rs
  CL-3:
    status: pass_static
    root_cause: prefix index rebuilt every frame even when width/revision/style/cell-count were unchanged.
    fix:
      - HeightPrefixBuildKey
      - rebuild_prefix_if_changed
      - prefix_rebuild_skipped and prefix_rebuilds metrics
    source:
      - vac-rs/crates/surfaces/tui/src/chatwidget/height_cache.rs
      - vac-rs/crates/surfaces/tui/src/chatwidget/chatwidget_group_025_epilogue.rs
  CL-4:
    status: pass_static
    root_cause: shimmer emitted one owned String/span per character and collected chars every frame.
    fix:
      - disabled animation fast path returns one full-text span
      - active animation groups contiguous characters with identical style
      - records spans_emitted metric
    source:
      - vac-rs/crates/surfaces/tui/src/shimmer.rs
  CL-5:
    status: pass_static
    root_cause: render path passed hardcoded scroll_top=0 to windowed_render_plan.
    fix:
      - added transcript_scroll_top source field
      - render path calls current_transcript_scroll_top()
      - WindowedTranscriptRenderPlan records scroll_top and first_visible_top
    source:
      - vac-rs/crates/surfaces/tui/src/chatwidget/split_002_new.rs
      - vac-rs/crates/surfaces/tui/src/chatwidget/chatwidget_group_025_epilogue.rs
      - vac-rs/crates/surfaces/tui/src/chatwidget/height_cache.rs
  CL-6:
    status: verified_static_existing
    finding: palette badge was suspected display-only
    verification:
      - dispatch_command blocks CommandAvailability::FeatureOff and CommandAvailability::Unavailable
      - dispatch_command_with_args blocks same availability states
      - static gate retains slash_command dispatch lock
    source:
      - vac-rs/crates/surfaces/tui/src/slash_command.rs
      - vac-rs/crates/surfaces/tui/src/chatwidget/slash_dispatch.rs
  CL-7:
    status: verified_static_existing
    finding: contrast validator was previously not wired into runtime theme picker
    verification:
      - enforce_contrast_for_custom_theme is called from theme_picker
      - low contrast custom theme falls back to readable theme with warning
    source:
      - vac-rs/crates/surfaces/tui/src/theme_picker.rs
  P-6:
    status: pass_static_runtime_source_ready
    root_cause: STARTUP_TASK_GRAPH existed as a contract but had no executor source path.
    fix:
      - StartupGraphExecutor executes non-blocking tasks under bounded parallelism
      - startup metrics include task_cancellation_count and executor evidence
      - run_static_startup_probe uses StartupGraphExecutor
    source:
      - vac-rs/crates/surfaces/tui/src/startup_task_graph.rs

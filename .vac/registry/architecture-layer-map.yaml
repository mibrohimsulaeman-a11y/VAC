schema_version: 1
kind: registry_status
id: registry.architecture-layer-map
updated_at: '2026-06-01T00:00:00Z'
status: static_refactor_map
summary: Incremental VAC-as-control-plane layer map after O5/O6 big refactor slice.
layered_workspace_target:
  intent: preserve existing package names while moving physical folders under vac-rs/crates/<layer>/<name> when cargo validation is available.
  members_glob:
    - crates/*/*
    - crates/*/*/*
  target_paths:
    - crates/control-plane/vac-control-plane
    - crates/surfaces/vac-tui
    - crates/surfaces/vac-cli
    - crates/capabilities/vac-chat
    - crates/capabilities/vac-build
    - crates/capabilities/vac-release
    - crates/capabilities/vac-sessions
    - crates/runtime/vac-exec
    - crates/runtime/vac-sandbox
    - crates/runtime/vac-shell
    - crates/providers/vac-provider-http
    - crates/integrations/vac-mcp
    - crates/foundation/vac-protocol
    - crates/foundation/runtime-protocol
    - crates/foundation/vac-state
    - crates/foundation/vac-utils
  blocker:
    status: TV-Pending
    reason: physical relocation of all crate paths is cargo-sensitive and requires cargo check/clippy/test feedback.
capability_extraction_target:
  status: TV-Pending
  reason: core capability drain is cargo-sensitive; keep as explicit contract until rustc/cargo validation is available.
  target_paths:
    - crates/capabilities/chat
    - crates/capabilities/build
    - crates/capabilities/release
    - crates/capabilities/sessions
    - crates/capabilities/tools
    - crates/capabilities/docs
  core_goal: keep vac-rs/core as session/agent orchestrator and capability glue only.
layers:
  control_plane:
    crates:
      - vac-control-plane
    source_of_record:
      - vac-rs/control-plane/src/control_plane
      - vac-rs/control-plane/src/local_runtime
    migration_note: Physical source-of-record moved into vac-rs/control-plane/src; cargo-backed compile remains TV-Pending.
  surfaces:
    crates:
      - vac-tui
      - vac-cli
  capabilities:
    crates:
      - vac-core
      - vac-models-manager
      - vac-memories-read
      - vac-memories-write
  runtime:
    crates:
      - vac-exec
      - vac-exec-server
      - vac-execpolicy
      - vac-sandboxing
      - vac-shell-command
      - vac-shell-escalation
      - vac-apply-patch
  providers:
    crates:
      - vac-provider-http
      - vac-api
      - vac-client
      - vac-model-provider
      - vac-login
      - vac-device-key
      - vac-aws-auth
      - vac-ollama
      - vac-lmstudio
    note: vac-provider-http now owns generic transport source; vac-api remains compatibility re-export until call-site migration completes.
  integrations:
    crates:
      - vac-connectors
      - vac-mcp
      - vac-rmcp-client
      - vac-network-proxy
      - vac-external-agent-migration
      - vac-external-agent-sessions
  foundation:
    crates:
      - vac-protocol
      - vac-runtime-protocol
      - vac-state
      - vac-rollout
      - vac-rollout-trace
      - vac-thread-store
      - vac-utils-absolute-path
      - vac-utils-cache
      - vac-utils-cli
truth:
  sv_status: SV-Done
  tv_status: TV-Pending
  cargo_reason: Rust toolchain unavailable in sandbox.
retired_from_active_workspace:
  - vac-chatgpt
  - vac-backend-client
  - vac-backend-openapi-models

workspace_layer_contract:
  status: SV-Done
  cargo_member_globs_registered:
    - crates/*/*
    - crates/*/*/*
  cargo_layer_manifest: vac-rs/crates/layer-map.yaml
  physical_move_policy: per-slice only after targeted cargo feedback is available; package names remain stable during folder migration.

physical_layer_relocation:
  status: SV-Done
  ledger: .vac/registry/layering-migration-ledger.yaml
  source_map: vac-rs/crates/layer-map.yaml
  residual_flat_crates:
    - vac-rs/core
  package_rename_status: TV-Pending
  full_capability_extraction_status: TV-Pending

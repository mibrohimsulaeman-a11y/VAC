    invariants:
      - messaging_gateway_is_notification_only
      - messaging_gateway_never_authorizes_runtime_action
      - messaging_tokens_redacted
      - delivery_failure_is_explicit
      - gateway_evidence_custody_not_upgraded
expected_code:
  modules:
    - vac-rs/crates/integrations/vac-messaging-gateway
out_of_scope:
  - messaging_delivery_as_policy_authority
  - raw_secret_or_token_evidence_persistence
  - delivery_success_as_trust_upgrade

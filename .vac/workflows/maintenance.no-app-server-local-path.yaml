schema_version: 1
kind: workflow
id: maintenance.no-app-server-local-path
title: No app-server local path gate
status: ready
inputs: {}
ui:
  surface: /workflow
  inspect_surface: /debug-config
  progress_panel: true
  activity_log: true
  approval_surface: true
  evidence_surface: true
policy:
  default_risk: safe_read
  mutates_files: false
  network: false
  redaction: true
  approval_required_for:
  - execute_process
steps:
- id: tui_source_scan
  uses: capability.activity.emit
  ui:
    surface: /debug-config
    progress_panel: true
    activity_log: true
    evidence_surface: true
- id: inverse_tree_snapshot
  uses: capability.activity.emit
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    evidence_surface: true
- id: defer_classification
  uses: capability.ownership.scan
  ui:
    surface: /capabilities
    progress_panel: true
    activity_log: true
    evidence_surface: true
- id: report
  uses: capability.activity.emit
  ui:
    surface: /workflow
    inspect_surface: /debug-config
    progress_panel: true
    activity_log: true
    evidence_surface: true
validation:
  gates:
  - defer_classification
  - inverse_tree_snapshot
  - report
  - tui_source_scan
  commands:
  - id: maintenance.no-app-server-local-path.validation.cmd001
    runner: bash
    args:
    - scripts/check-no-app-server-local-path-contract.sh
    risk: execute_process
    approval: policy
  - id: maintenance.no-app-server-local-path.validation.cmd002
    runner: cargo
    args:
    - +1.95.0
    - check
    - -p
    - vac-tui
    risk: execute_process
    approval: policy

schema_version: 1
kind: workflow
id: maintenance.tui-operator-visual-gate
title: TUI operator visual fidelity gate
status: ready
inputs: {}
ui:
  surface: /visual-gate
  inspect_surface: /capabilities
  progress_panel: true
  activity_log: true
  evidence_surface: true
policy:
  default_risk: safe_read
  mutates_files: false
  network: false
  redaction: false
  approval_required_for: []
steps:
- id: deterministic_snapshot_proof
  uses: capability.tui.operator_visual_gate.snapshot
  ui:
    surface: /visual-gate
    progress_panel: true
    activity_log: true
    evidence_surface: true
- id: ansi_style_proof
  uses: capability.tui.operator_visual_gate.ansi
  ui:
    surface: /visual-gate
    progress_panel: true
    activity_log: true
    evidence_surface: true
- id: pty_contract_documented
  uses: capability.tui.operator_visual_gate.pty_contract
  ui:
    surface: /visual-gate
    progress_panel: true
    activity_log: true
    evidence_surface: true
validation:
  commands:
  - id: maintenance.tui-operator-visual-gate.validation.cmd001
    runner: bash
    args:
    - scripts/check-tui-pty-gate-contract.sh
    risk: execute_process
    approval: policy
  - id: maintenance.tui-operator-visual-gate.validation.cmd002
    runner: bash
    args:
    - scripts/check-tui-pty-gate.sh
    risk: execute_process
    approval: policy
  gates:
  - ansi_style_proof
  - deterministic_snapshot_proof
  - pty_contract_documented

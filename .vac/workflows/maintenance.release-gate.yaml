schema_version: 2
kind: workflow
id: maintenance.release-gate
title: Release gate
status: ready
policy:
  default_risk: safe_read
  mutates_files: false
  network: false
gates:
  - { id: architecture, uses: capability.architecture.invariants }
  - { id: identity,     uses: capability.identity.check }
  - { id: registry,     uses: capability.registry.schema_check }
  - { id: budget,       uses: capability.budget.check }      # authored .vac size
  - { id: ci-rust,      uses: capability.ci.rust_ci }        # GitHub "Rust CI" conclusion
  - { id: ownership,    uses: capability.ownership.scan }    # orphan files => fail
  - { id: evidence,     uses: capability.evidence.verify }   # rejects agent-authored evidence
ci:
  provider: github-actions
  workflow_name: "Rust CI"
  require_conclusion: success
acceptance:
  mode: binary
  unknown_is: fail
  require:
    all_gates: pass
    open_findings: 0
    expired_waivers: 0
    ci_conclusion: success
  evidence: runner_emitted

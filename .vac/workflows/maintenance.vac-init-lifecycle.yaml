schema_version: 1
kind: workflow
id: maintenance.vac-init-lifecycle
title: VAC-Init lifecycle state machine readiness
status: ready
inputs: {}
steps:
- id: lifecycle_state_contract
  uses: capability.vac.init.lifecycle.check
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: false
    evidence_surface: true
- id: lifecycle_resume_guard
  uses: capability.activity.emit
  depends_on:
  - lifecycle_state_contract
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: false
    evidence_surface: true
ui:
  surface: /workflow
  inspect_surface: /capabilities
  progress_panel: true
  activity_log: true
  approval_surface: false
  evidence_surface: true
policy:
  default_risk: safe_read
  mutates_files: true
  network: false
  redaction: false
  approval_required_for:
  - filesystem_write
validation:
  gates:
  - lifecycle_resume_guard
  - lifecycle_state_contract
  - vac_init_lifecycle_contract
  commands:
  - id: maintenance.vac-init-lifecycle.validation.cmd001
    runner: bash
    args:
    - scripts/check-vac-init-lifecycle-contract.sh
    risk: execute_process
    approval: policy

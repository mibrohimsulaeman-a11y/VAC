summary: Validate that /status keeps model/provider/token/context rows while removing legacy limit and credit display rows.
description: Hardening 3 workflow for the status output contract, including semantic status labels, multi-provider/model readiness, and no legacy rate-limit/credit operator card output.
triggers:

schema_version: 1
kind: workflow
id: maintenance.donor-migration-gate
title: Donor migration consistency gate
status: ready
inputs: {}
ui:
  surface: /workflow
  progress_panel: true
  activity_log: true
  evidence_surface: true
policy:
  default_risk: safe_read
  approval_required_for: []
  mutates_files: false
  network: false
  redaction: false
steps:
- id: root_seed_coverage
  uses: capability.root_seed.coverage
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: false
    evidence_surface: true
- id: orient
  uses: capability.architecture.invariants
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: false
    evidence_surface: true
- id: inventory_complete
  uses: capability.donor_migration.inventory_check
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: false
    evidence_surface: true
- id: drift_check
  uses: capability.donor_migration.drift_check
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: false
    evidence_surface: true
- id: manifest_required
  uses: capability.donor_migration.manifest_check
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: false
    evidence_surface: true
- id: quarantine_reachability
  uses: capability.donor_migration.reachability_check
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: false
    evidence_surface: true
- id: migrated_evidence_check
  uses: capability.donor_migration.evidence_check
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: false
    evidence_surface: true
- id: commit_phrase_check
  uses: capability.donor_migration.commit_phrase_check
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: false
    evidence_surface: true
- id: report
  uses: capability.activity.emit
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: false
    evidence_surface: true
validation:
  commands:
  - id: maintenance.donor-migration-gate.validation.cmd001
    runner: bash
    args:
    - scripts/check-donor-status.sh
    - all
    risk: execute_process
    approval: policy
  - id: maintenance.donor-migration-gate.validation.cmd002
    runner: bash
    args:
    - scripts/check-donor-status.sh
    - contracts
    risk: execute_process
    approval: policy
  - id: maintenance.donor-migration-gate.validation.cmd003
    runner: cargo
    args:
    - +1.95.0
    - run
    - -p
    - vac-cli
    - --
    - doctor
    - registry
    - .
    risk: execute_process
    approval: policy
  gates:
  - commit_phrase_check
  - drift_check
  - inventory_complete
  - manifest_required
  - migrated_evidence_check
  - orient
  - quarantine_reachability
  - report
  - root_seed_coverage

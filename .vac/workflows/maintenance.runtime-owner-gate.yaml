schema_version: 1
kind: workflow
id: maintenance.runtime-owner-gate
title: Runtime owner gate
status: ready
inputs: {}
ui:
  surface: /workflow
  inspect_surface: /debug-config
  progress_panel: true
  activity_log: true
  approval_surface: true
  evidence_surface: true
policy:
  default_risk: safe_read
  mutates_files: false
  network: false
  redaction: true
  approval_required_for:
  - execute_process
steps:
- id: manifest_inventory
  uses: capability.activity.emit
  ui:
    surface: /capabilities
    progress_panel: true
    activity_log: true
    evidence_surface: true
- id: runtime_owner_doctor
  uses: capability.registry.schema_check
  ui:
    surface: /debug-config
    progress_panel: true
    activity_log: true
    evidence_surface: true
- id: ownership_scan
  uses: capability.ownership.scan
  ui:
    surface: /capabilities
    progress_panel: true
    activity_log: true
    evidence_surface: true
- id: report
  uses: capability.activity.emit
  ui:
    surface: /workflow
    inspect_surface: /debug-config
    progress_panel: true
    activity_log: true
    evidence_surface: true
validation:
  gates:
  - manifest_inventory
  - ownership_scan
  - report
  - runtime_owner_doctor
  commands:
  - id: maintenance.runtime-owner-gate.validation.cmd001
    runner: vac
    args:
    - doctor
    - runtime-owner-gates
    - .
    risk: execute_process
    approval: policy
  - id: maintenance.runtime-owner-gate.validation.cmd002
    runner: vac
    args:
    - doctor
    - registry
    - .
    risk: execute_process
    approval: policy

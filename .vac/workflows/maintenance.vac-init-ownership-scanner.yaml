  mutates_files: false
  network: false
  redaction: false
  approval_required_for: []
validation:
  gates:
  - quarantine_contract
  - source_inventory_contract
  - vac_init_ownership_scanner_contract
  commands:
  - id: maintenance.vac-init-ownership-scanner.validation.cmd001

schema_version: 1
kind: workflow
id: maintenance.tui-hardening-4-10
title: TUI Operator UI Hardening 4-10 Aggregate Gate
status: ready
owner:
  crate: vac-surface-tui
  module: operator_ui
triggers:
- kind: manual
  id: check_tui_hardening_4_10
steps:
- id: regression_lock
  uses: capability.vac.tui.check
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: false
    evidence_surface: true
- id: hardening_4_10_contract
  uses: capability.vac.tui.check
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: false
    evidence_surface: true
policy:
  mutates_files: false
  network: false
  default_risk: safe_read
  redaction: false
  approval_required_for: []
ui:
  surface: /workflow
  inspect_surface: /capabilities
  progress_panel: true
  activity_log: true
  approval_surface: false
  evidence_surface: true
validation:
  gates:
  - hardening_4_10_contract
  - regression_lock
  commands:
  - id: maintenance.tui-hardening-4-10.validation.cmd001
    runner: bash
    args:
    - scripts/check-tui-hardening-regression-lock.sh
    risk: execute_process
    approval: policy
  - id: maintenance.tui-hardening-4-10.validation.cmd002
    runner: bash
    args:
    - scripts/check-tui-hardening-4-10-contract.sh
    risk: execute_process
    approval: policy

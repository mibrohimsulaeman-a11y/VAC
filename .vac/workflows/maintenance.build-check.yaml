schema_version: 1
kind: workflow
id: maintenance.build-check
title: Build check
status: ready
inputs: {}
ui:
  surface: /workflow
  inspect_surface: /debug-config
  progress_panel: true
  activity_log: true
  approval_surface: true
  evidence_surface: true
policy:
  default_risk: safe_read
  approval_required_for:
  - execute_process
  mutates_files: false
  network: false
  redaction: false
steps:
- id: orient
  uses: capability.identity.check
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: false
    evidence_surface: true
- id: validate
  uses: capability.build.cargo_check
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: false
    evidence_surface: true
- id: report
  uses: capability.activity.emit
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: false
    evidence_surface: true
validation:
  commands:
  - id: maintenance.build-check.validation.cmd001
    runner: cargo
    args:
    - +1.95.0
    - check
    - -p
    - vac-cli
    risk: execute_process
    approval: policy
  - id: maintenance.build-check.validation.fmt
    runner: cargo
    args:
    - +1.95.0
    - fmt
    - --all
    - --check
    risk: execute_process
    approval: policy
  - id: maintenance.build-check.validation.clippy
    runner: cargo
    args:
    - +1.95.0
    - clippy
    - --workspace
    - --all-targets
    - --
    - -D
    - warnings
    risk: execute_process
    approval: policy
  - id: maintenance.build-check.validation.deny
    runner: cargo
    args:
    - +1.95.0
    - deny
    - check
    risk: execute_process
    approval: policy
  - id: maintenance.build-check.validation.audit
    runner: cargo
    args:
    - +1.95.0
    - audit
    risk: execute_process
    approval: policy
  gates:
  - orient
  - report
  - validate

schema_version: 1
kind: workflow
id: maintenance.build-check
title: Build check (delegated to GitHub CI "Rust CI")
status: ready
# Cargo validation runs on GitHub Actions, NEVER on the local machine.
# Source of truth: .github/workflows/ci.yml (name: "Rust CI").
ci:
  provider: github-actions
  repo: mibrohimsulaeman-a11y/VAC
  workflow_file: .github/workflows/ci.yml
  workflow_name: "Rust CI"
  toolchain: "1.95.0"          # pinned by vac-rs/rust-toolchain.toml
  working_directory: vac-rs
  profile: ci-test
  trigger:
    - push to main / pull_request (automatic)
    - gh workflow run "Rust CI" --ref main   # workflow_dispatch
  read_results:
    - gh run list --workflow "Rust CI"
    - gh run view --log-failed
policy:
  default_risk: safe_read
  mutates_files: false
  network: false
  local_cargo: forbidden       # do not build/test/clippy/fmt locally
jobs:
  - { id: fmt,    run: "cargo fmt --all --check" }
  - { id: clippy, run: "cargo clippy --workspace --all-targets --profile ci-test -- -D warnings" }
  - { id: test,   run: "cargo nextest run --workspace --cargo-profile ci-test --partition count:{n}/4", matrix: { partition: [1, 2, 3, 4] } }
acceptance:
  mode: binary
  unknown_is: fail             # a CI job that did not run => fail-closed
  evidence: runner_emitted     # source = GitHub Actions run conclusion + logs
  evidence_source: gh_actions_run
  waivable_by: ledger/waivers.yaml

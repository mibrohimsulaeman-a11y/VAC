schema_version: 1
kind: workflow
id: maintenance.regen-control-plane
title: Regenerate VAC control-plane projections
status: disabled
description: Regenerate derivable .vac/.init and living docs projections while preserving authored intent and append-only history.
inputs: {}
steps:
  - id: protect_history
    uses: capability.docs.protect_append_only_history
    description: Verify registry/evidence, plans, trajectory and ADR/decision history remain present.
  - id: prune_generated
    uses: capability.docs.prune_generated_projection
    description: Prune generated .vac/.init outputs and retired donor living docs before regeneration.
  - id: regenerate_projection
    uses: capability.docs.regenerate_control_plane_projection
    description: Run scripts/regen-vac-control-plane-projection.py.
  - id: validate_projection
    uses: capability.docs.validate_control_plane_projection
    description: Run scripts/check-vac-regen-control-plane-projection.sh.
ui:
  surface: /workflow
  inspect_surface: /capabilities
  progress_panel: true
  activity_log: true
  approval_surface: false
  evidence_surface: true
policy:
  default_risk: safe_write
validation:
  commands:
    - id: maintenance.regen-control-plane.validation.cmd001
      runner: bash
      args:
        - scripts/check-vac-regen-control-plane-projection.sh
      risk: execute_process
      approval: policy

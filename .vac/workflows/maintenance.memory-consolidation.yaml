schema_version: 1
kind: workflow
id: maintenance.memory-consolidation
title: Post-feature memory consolidation & reflection
status: ready
steps:
  - id: step_read_working_memory
    uses: capability.memory.read_transient
  - id: step_distill_learnings
    uses: capability.memory.reflect_and_distill
  - id: step_write_semantic_fact
    uses: capability.memory.write_semantic
  - id: step_clean_working_memory
    uses: capability.memory.clear_transient
policy:
  default_risk: write_workspace
  mutates_files: true
  network: false
  redaction: true
validation:
  gates:
  - memory_doctor
  commands:
  - id: maintenance.memory-consolidation.validation.memory-doctor
    runner: vac
    args:
    - doctor
    - memory
    risk: safe_read
    approval: policy
ui:
  surface: /memories
  progress_panel: true
  activity_log: true
  evidence_surface: true

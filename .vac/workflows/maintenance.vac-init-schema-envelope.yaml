schema_version: 1
kind: workflow
id: maintenance.vac-init-schema-envelope
title: VAC-Init schema envelope and kind registry readiness
status: ready
inputs: {}
steps:
- id: schema_envelope_contract
  uses: capability.registry.schema_check
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: false
    evidence_surface: true
- id: baseline_contract
  uses: capability.activity.emit
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: false
    evidence_surface: true
- id: source_hygiene
  uses: capability.tui.no_duplicate_runtime
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: false
    evidence_surface: true
ui:
  surface: /workflow
  inspect_surface: /capabilities
  progress_panel: true
  activity_log: true
  approval_surface: false
  evidence_surface: true
policy:
  default_risk: safe_read
  mutates_files: false
  network: false
  redaction: false
  approval_required_for: []
validation:
  gates:
  - baseline_contract
  - schema_envelope_contract
  - source_hygiene
  - vac_init_baseline_contract
  - vac_init_kind_registry_contract
  - vac_init_schema_envelope_contract
  commands:
  - id: maintenance.vac-init-schema-envelope.validation.cmd001
    runner: bash
    args:
    - scripts/check-vac-init-schema-envelope-contract.sh
    risk: execute_process
    approval: policy
  - id: maintenance.vac-init-schema-envelope.validation.cmd002
    runner: bash
    args:
    - scripts/check-vac-init-baseline-contract.sh
    risk: execute_process
    approval: policy

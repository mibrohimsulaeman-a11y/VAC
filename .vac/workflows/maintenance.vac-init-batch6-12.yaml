schema_version: 1
kind: workflow
id: maintenance.vac-init-batch6-12
title: VAC-Init Batch 6-12 bounded agent loop and evidence readiness
status: ready
inputs: {}
steps:
- id: risk_policy
  uses: capability.vac.init.risk-policy.check
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: true
    evidence_surface: true
- id: policy_evaluator
  uses: capability.vac.init.policy-evaluator.check
  depends_on:
  - risk_policy
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: true
    evidence_surface: true
- id: command_gate
  uses: capability.vac.init.command-gate.check
  depends_on:
  - policy_evaluator
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: true
    evidence_surface: true
- id: semantic_plan
  uses: capability.vac.init.semantic-plan.check
  depends_on:
  - command_gate
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: true
    evidence_surface: true
- id: approval_binding
  uses: capability.vac.init.approval-binding.check
  depends_on:
  - semantic_plan
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: true
    evidence_surface: true
- id: patch_guard
  uses: capability.vac.init.patch-guard.check
  depends_on:
  - approval_binding
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: true
    evidence_surface: true
- id: evidence_chain

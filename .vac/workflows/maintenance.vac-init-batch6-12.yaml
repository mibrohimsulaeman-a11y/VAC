  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: true
    evidence_surface: true
ui:
  surface: /workflow
  inspect_surface: /capabilities
  progress_panel: true
  activity_log: true
  approval_surface: true
  evidence_surface: true
policy:

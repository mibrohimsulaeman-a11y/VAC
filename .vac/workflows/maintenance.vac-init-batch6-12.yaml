  mutates_files: false
  network: false
  redaction: false
  approval_required_for:
  - execute_process
validation:
  gates:
  - approval_binding
  - command_gate
  - evidence_chain
  - patch_guard
  - policy_evaluator
  - risk_policy
  - semantic_plan
  - vac_init_batch6_12_contract
  commands:
  - id: maintenance.vac-init-batch6-12.validation.cmd001
    runner: bash
    args:
    - scripts/check-vac-init-batch6-12-contract.sh

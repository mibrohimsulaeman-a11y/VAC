schema_version: 1
kind: workflow
id: maintenance.no-duplicate-tui
title: TUI uniqueness check
status: ready
inputs: {}
ui:
  surface: /workflow
  inspect_surface: /capabilities
  progress_panel: true
  activity_log: true
  approval_surface: false
  evidence_surface: true
policy:
  default_risk: safe_read
  mutates_files: false
  network: false
  redaction: false
  approval_required_for: []
steps:
- id: orient
  uses: capability.tui.no_duplicate_runtime
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: false
    evidence_surface: true
- id: report
  uses: capability.activity.emit
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: false
    evidence_surface: true
validation:
  commands:
  - id: maintenance.no-duplicate-tui.validation.cmd001
    runner: cargo
    args:
    - +1.93.0
    - check
    - -p
    - vac-tui
    - --tests
    risk: execute_process
    approval: policy
  - id: maintenance.no-duplicate-tui.validation.cmd002
    runner: cargo
    args:
    - +1.93.0
    - check
    - -p
    - vac-cli
    risk: execute_process
    approval: policy
  gates:
  - orient
  - report

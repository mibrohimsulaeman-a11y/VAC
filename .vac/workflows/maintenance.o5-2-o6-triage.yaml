schema_version: 1
kind: workflow
id: maintenance.o5-2-o6-triage
title: O5.2 semantic source split and O6 quality triage
status: ready
inputs: {}
steps:
- id: godfile_staging
  uses: capability.vac.monolith.godfile-staging.check
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: false
    evidence_surface: true
- id: quality_triage
  uses: capability.vac.quality.depanic-unsafe-triage.check
  depends_on:
  - godfile_staging
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: false
    evidence_surface: true
ui:
  surface: /workflow
  inspect_surface: /release
  progress_panel: true
  activity_log: true
  approval_surface: false
  evidence_surface: true
policy:
  default_risk: medium
  mutates_files: true
  network: false
  redaction: false
  approval_required_for:
  - filesystem_write
validation:
  gates:
  - o5_2_o6_triage
  commands:
  - id: maintenance.o5-2-o6-triage.validation.cmd001
    runner: bash
    args:
    - scripts/check-vac-o5-2-godfile-staging.sh
    risk: execute_process
    approval: policy
  - id: maintenance.o5-2-o6-triage.validation.cmd002
    runner: bash
    args:
    - scripts/check-vac-o6-quality-triage.sh
    risk: execute_process
    approval: policy

schema_version: 1
kind: workflow
id: maintenance.evidence-why-live
title: VAC-Init Evidence Writer and vac why Live Index
status: ready
inputs: {}
steps:
- id: evidence_writer
  uses: capability.vac.init.evidence-why-live.check
  ui:
    surface: /evidence
    progress_panel: true
    activity_log: true
    approval_surface: false
    evidence_surface: true
- id: why_index
  uses: capability.vac.init.evidence-why-live.check
  depends_on:
  - evidence_writer
  ui:
    surface: /why
    progress_panel: true
    activity_log: true
    approval_surface: false
    evidence_surface: true
ui:
  surface: /workflow
  inspect_surface: /evidence
  progress_panel: true
  activity_log: true
  approval_surface: false
  evidence_surface: true
policy:
  default_risk: safe_read
  mutates_files: true
  network: false
  redaction: true
  approval_required_for:
  - evidence_write
validation:
  gates:
  - evidence_why_live_index
  commands:
  - id: maintenance.evidence-why-live.validation.cmd001
    runner: bash
    args:
    - scripts/check-vac-evidence-why-live-index.sh
    risk: execute_process
    approval: policy

schema_version: 1
kind: workflow
id: maintenance.durable-stores
title: VAC-Init Durable Stores readiness
status: ready
inputs: {}
steps:
- id: init_ownership_risk_stores
  uses: capability.vac.init.durable-stores.check
  ui:
    surface: /runtime
    progress_panel: true
    activity_log: true
    approval_surface: true
    evidence_surface: true
- id: approval_store_replay

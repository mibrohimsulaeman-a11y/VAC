ui:
  surface: /workflow
  inspect_surface: /capabilities
  progress_panel: true
  activity_log: true
  approval_surface: false
  evidence_surface: true
validation:
  gates:
  - approval_popup_safety_contract
  commands:
  - id: maintenance.tui-approval-popup-safety.validation.cmd001
    runner: bash
    args:
    - scripts/check-tui-approval-popup-safety-contract.sh
    risk: execute_process
    approval: policy

schema_version: 1
kind: workflow
id: maintenance.tui-approval-popup-safety
title: TUI Approval Popup Safety Gate
status: ready
owner:
  crate: vac-surface-tui
  module: bottom_pane.approval_overlay
triggers:
- kind: manual
  id: check_tui_approval_popup_safety
steps:
- id: approval_popup_safety_contract
  uses: capability.vac.tui.approval-popup-safety.check
  ui:
    surface: /workflow
    progress_panel: true
    activity_log: true
    approval_surface: false
    evidence_surface: true
policy:

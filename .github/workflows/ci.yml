name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, beta]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false
          workspaces: ./vac-rs -> target
          key: rust-ci-${{ hashFiles('vac-rs/Cargo.lock') }}

      - name: Format Check
        run: cargo fmt --manifest-path vac-rs/Cargo.toml --all -- --check

      - name: Lint
        run: cargo clippy --manifest-path vac-rs/Cargo.toml --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --manifest-path vac-rs/Cargo.toml --verbose

      - name: Test
        run: cargo test --manifest-path vac-rs/Cargo.toml --workspace --verbose

      - name: Free build artifacts before feature-gated tests
        run: cargo clean --manifest-path vac-rs/Cargo.toml

      - name: Test (feature-gated)
        run: |
          cargo test --manifest-path vac-rs/Cargo.toml -p vac-foundation --features sqlite --verbose
          cargo test --manifest-path vac-rs/Cargo.toml -p vac-cli --features libsql-test --verbose
          cargo test --manifest-path vac-rs/Cargo.toml -p vac-messaging-gateway --features libsql-test --verbose
          cargo test --manifest-path vac-rs/Cargo.toml -p vac-provider-core --features network-tests --verbose

      - name: Free build artifacts before cache save
        if: always()
        run: rm -rf vac-rs/target

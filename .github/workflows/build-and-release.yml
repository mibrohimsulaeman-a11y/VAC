name: Build and Release

on:
  push:
    # Branches trigger builds only (no release)
    # - main: production builds
    # - beta: beta channel builds
    branches: [main, beta]
    # Tags trigger full release workflow
    # - v1.2.3: stable release
    # - v1.2.3-beta.1: beta/prerelease
    tags: ["v*"]
  # pull_request:
  #   branches: [main, beta]

permissions:
  contents: write
  discussions: write
  pull-requests: read
  packages: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: vac

jobs:
  # Determine release type once, other jobs reference this
  setup:
    runs-on: ubuntu-22.04
    outputs:
      is_beta: ${{ steps.check.outputs.is_beta }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Check release type
        id: check
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          # Remove 'v' prefix if present
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "$TAG" == *"-beta"* ]]; then
            echo "is_beta=true" >> $GITHUB_OUTPUT
          else
            echo "is_beta=false" >> $GITHUB_OUTPUT
          fi

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            artifact_name: vac-linux-x86_64
            features: --features jemalloc
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-musl
            artifact_name: vac-linux-aarch64
            features: --features jemalloc
            docker: rust:1.94-alpine3.21
          - os: macos-15
            target: x86_64-apple-darwin
            artifact_name: vac-darwin-x86_64
          - os: macos-15
            target: aarch64-apple-darwin
            artifact_name: vac-darwin-aarch64
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact_name: vac-windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        if: ${{ !matrix.docker }}
        uses: dtolnay/rust-toolchain@1.94.1
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        if: ${{ !matrix.docker }}
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.target }}

      - name: Install MUSL tools
        if: endsWith(matrix.target, 'linux-musl') && !matrix.docker
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Docker cargo cache
        if: matrix.docker
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo-docker/registry
            ~/.cargo-docker/git
          key: docker-cargo-${{ matrix.target }}-${{ hashFiles('vac-rs/Cargo.lock') }}
          restore-keys: docker-cargo-${{ matrix.target }}-

      - name: Docker build cache (target dir)
        if: matrix.docker
        uses: actions/cache@v4
        with:
          path: vac-rs/target/
          key: docker-target-${{ matrix.target }}-${{ hashFiles('vac-rs/Cargo.lock') }}
          restore-keys: docker-target-${{ matrix.target }}-

      # Alpine is required for aarch64-musl: Ubuntu's musl-gcc wrapper lacks
      # C11 atomics support needed by jemalloc and libsql-ffi on ARM.
      - name: Build and test in Alpine container
        if: matrix.docker
        run: |
          mkdir -p ~/.cargo-docker/registry ~/.cargo-docker/git
          docker run --rm \
            --user 0:0 \
            -v "${{ github.workspace }}:/build" \
            -w /build/vac-rs \
            -v "$HOME/.cargo-docker/registry:/usr/local/cargo/registry" \
            -v "$HOME/.cargo-docker/git:/usr/local/cargo/git" \
            -e SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt \
            ${{ matrix.docker }} sh -c '
              set -euo pipefail
              apk add --no-cache gcc musl-dev make binutils pkgconfig openssl-dev openssl-libs-static ca-certificates vim
              cargo build --release --target ${{ matrix.target }} ${{ matrix.features }}
              cargo test --target ${{ matrix.target }} ${{ matrix.features }}

              # Verify jemalloc overrides musl malloc
              BINARY="target/${{ matrix.target }}/release/vac"
              if nm "$BINARY" 2>/dev/null | grep -q " W malloc$"; then
                echo "FAIL: jemalloc not overriding musl malloc — SQLite will SIGSEGV"
                exit 1
              fi
              echo "OK: jemalloc override verified"
            '

      - name: Fix Docker cache permissions
        if: matrix.docker
        run: sudo chown -R $(id -u):$(id -g) ~/.cargo-docker

      - name: Build
        if: ${{ !matrix.docker }}
        run: cargo build --manifest-path vac-rs/Cargo.toml --release --target ${{ matrix.target }} ${{ matrix.features }}

      - name: Run tests
        if: ${{ !matrix.docker }}
        run: cargo test --manifest-path vac-rs/Cargo.toml --target ${{ matrix.target }} ${{ matrix.features }}

      - name: Verify jemalloc overrides musl malloc
        if: endsWith(matrix.target, 'linux-musl') && !matrix.docker
        run: |
          BINARY="vac-rs/target/${{ matrix.target }}/release/vac"
          if nm "$BINARY" 2>/dev/null | grep -q " W malloc$"; then
            echo "FAIL: jemalloc not overriding musl malloc — SQLite will SIGSEGV"
            exit 1
          fi
          echo "OK: jemalloc override verified"

      - name: Prepare binary
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          cd vac-rs/target/${{ matrix.target }}/release
          if [ "$RUNNER_OS" == "Windows" ]; then
            7z a ../../../../${{ matrix.artifact_name }}.zip ${{ env.BINARY_NAME }}.exe
          else
            tar czf ../../../../${{ matrix.artifact_name }}.tar.gz ${{ env.BINARY_NAME }}
          fi

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.*
          retention-days: 1

  release:
    needs: [setup, build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            vac-linux-x86_64/vac-linux-x86_64.tar.gz
            vac-linux-aarch64/vac-linux-aarch64.tar.gz
            vac-darwin-x86_64/vac-darwin-x86_64.tar.gz
            vac-darwin-aarch64/vac-darwin-aarch64.tar.gz
            vac-windows-x86_64/vac-windows-x86_64.zip
          draft: false
          prerelease: ${{ needs.setup.outputs.is_beta == 'true' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_crates_io:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.94.1

      - name: Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          # Remove 'v' prefix if present
          VERSION=${VERSION#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Tag version: $VERSION"

          # Verify and, for tag builds only, align the workspace manifest to the tag.
          CARGO_VERSION=$(grep -m1 '^version = ' vac-rs/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "Cargo.toml version: $CARGO_VERSION"

          if [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "Warning: tag version ($VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
          fi

          VERSION="$VERSION" python3 - <<'PY_SYNC_CARGO_VERSION'
          import os
          import re
          from pathlib import Path

          version = os.environ["VERSION"]
          manifest = Path("vac-rs/Cargo.toml")
          text = manifest.read_text(encoding="utf-8")
          text, workspace_version_count = re.subn(
              r'(^version\s*=\s*")[^"]+(")',
              rf'\g<1>{version}\2',
              text,
              count=1,
              flags=re.MULTILINE,
          )
          if workspace_version_count != 1:
              raise SystemExit("failed to update [workspace.package] version")
          workspace_dependency_version = re.compile(
              r'^(?P<prefix>vac[A-Za-z0-9_-]*\s*=\s*\{[^}\n]*\bversion\s*=\s*")[^"]+(?P<suffix>"[^}\n]*\})',
              re.MULTILINE,
          )
          text = workspace_dependency_version.sub(
              lambda match: f"{match.group('prefix')}{version}{match.group('suffix')}",
              text,
          )
          manifest.write_text(text, encoding="utf-8")
          PY_SYNC_CARGO_VERSION
          cargo update --manifest-path vac-rs/Cargo.toml --workspace

      - name: Login to crates.io
        run: echo "$CRATES_IO_TOKEN" | cargo login
        env:
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      - name: Publish workspace members to crates.io
        run: |
          set -euo pipefail
          VERSION=${{ steps.get_version.outputs.VERSION }}

          echo "Publishing workspace members to crates.io version $VERSION"

          # Function to publish a package, skip if already published
          publish_package() {
            local pkg=$1
            echo "Publishing $pkg..."
            # Capture output and exit code
            set +e
            OUTPUT=$(cargo publish --manifest-path vac-rs/Cargo.toml -p "$pkg" --no-verify --allow-dirty 2>&1)
            EXIT_CODE=$?
            set -e

            if [ $EXIT_CODE -eq 0 ]; then
              echo "$pkg published successfully"
              echo "Waiting 15s for index propagation..."
              sleep 15
            elif echo "$OUTPUT" | grep -q "already uploaded"; then
              echo "$pkg version $VERSION already published, skipping"
            else
              echo "Error publishing $pkg:"
              echo "$OUTPUT"
              exit 1
            fi
          }

          cargo metadata --manifest-path vac-rs/Cargo.toml --no-deps --format-version 1 > /tmp/vac-cargo-metadata.json
          python3 - <<'PY_PUBLISH_PLAN' > /tmp/vac-publish-plan.txt
          import json
          from pathlib import Path

          metadata = json.loads(Path("/tmp/vac-cargo-metadata.json").read_text(encoding="utf-8"))
          workspace_ids = set(metadata["workspace_members"])
          packages_by_id = {
              package["id"]: package
              for package in metadata["packages"]
              if package["id"] in workspace_ids and package.get("publish") != []
          }
          ids_by_name = {package["name"]: package_id for package_id, package in packages_by_id.items()}

          dependencies_by_id = {}
          for package_id, package in packages_by_id.items():
              dependencies = set()
              for dependency in package.get("dependencies", []):
                  dependency_id = ids_by_name.get(dependency.get("name", ""))
                  if dependency_id is not None:
                      dependencies.add(dependency_id)
              dependencies_by_id[package_id] = dependencies

          visited = set()
          visiting = set()
          ordered = []

          def visit(package_id):
              if package_id in visited:
                  return
              if package_id in visiting:
                  raise SystemExit(f"cycle in workspace publish graph at {packages_by_id[package_id]['name']}")
              visiting.add(package_id)
              for dependency_id in sorted(
                  dependencies_by_id[package_id],
                  key=lambda item: packages_by_id[item]["name"],
              ):
                  visit(dependency_id)
              visiting.remove(package_id)
              visited.add(package_id)
              ordered.append(package_id)

          for package_id in sorted(
              packages_by_id,
              key=lambda item: packages_by_id[item]["manifest_path"],
          ):
              visit(package_id)

          for package_id in ordered:
              print(packages_by_id[package_id]["name"])
          PY_PUBLISH_PLAN

          mapfile -t VAC_PUBLISH_PACKAGES < /tmp/vac-publish-plan.txt
          if [ "${#VAC_PUBLISH_PACKAGES[@]}" -eq 0 ]; then
            echo "No publishable workspace packages found"
            exit 1
          fi

          echo "Publish plan derived from cargo metadata:"
          printf '  %s\n' "${VAC_PUBLISH_PACKAGES[@]}"
          for pkg in "${VAC_PUBLISH_PACKAGES[@]}"; do
            publish_package "$pkg"
          done

          echo "All metadata-derived packages published successfully!"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

  docker:
    needs: [setup, build]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:v${{ needs.setup.outputs.version }}
            ${{ needs.setup.outputs.is_beta != 'true' && format('ghcr.io/{0}:latest', github.repository) || '' }}

  update-release-notes:
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Need full history for git-cliff

      - name: Install git-cliff
        run: cargo install git-cliff

      - name: Generate release notes with git-cliff
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          # Get the previous tag to generate notes between tags
          PREV_TAG=$(git describe --tags --abbrev=0 "$VERSION^" 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, skipping release notes generation"
            exit 0
          fi

          # Generate notes between previous and current tag
          git-cliff "$PREV_TAG..$VERSION" --strip all > release_notes.md

          # Check if release notes are empty
          if [ ! -s release_notes.md ]; then
            echo "No commits found between $PREV_TAG and $VERSION"
            exit 0
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update GitHub Release
        run: |
          VERSION=${GITHUB_REF#refs/tags/}

          # Check if release notes file exists and has content
          if [ ! -f release_notes.md ]; then
            echo "Release notes file not found, skipping update"
            exit 0
          fi

          # Check if file is empty or only contains whitespace
          if [ ! -s release_notes.md ] || ! grep -q '[^[:space:]]' release_notes.md; then
            echo "Release notes file is empty, skipping update"
            exit 0
          fi

          echo "Updating release notes for $VERSION"
          gh release edit "$VERSION" --notes-file release_notes.md || echo "Failed to update release notes, continuing anyway"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    needs: [setup, release]
    # Only update homebrew for stable releases (not beta)
    if: startsWith(github.ref, 'refs/tags/') && needs.setup.outputs.is_beta == 'false'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
        with:
          repository: ${{ github.repository_owner }}/homebrew-vac
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Update Homebrew formula
        env:
          GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          VERSION: ${{ needs.setup.outputs.version }}
        run: |

          curl -L "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/vac-darwin-x86_64.tar.gz" -o vac-darwin-x86_64.tar.gz
          curl -L "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/vac-darwin-aarch64.tar.gz" -o vac-darwin-aarch64.tar.gz
          curl -L "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/vac-linux-x86_64.tar.gz" -o vac-linux-x86_64.tar.gz
          curl -L "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/vac-linux-aarch64.tar.gz" -o vac-linux-aarch64.tar.gz

          SHA256_DARWIN_X64=$(sha256sum vac-darwin-x86_64.tar.gz | cut -d ' ' -f 1)
          SHA256_DARWIN_ARM=$(sha256sum vac-darwin-aarch64.tar.gz | cut -d ' ' -f 1)
          SHA256_LINUX_X64=$(sha256sum vac-linux-x86_64.tar.gz | cut -d ' ' -f 1)
          SHA256_LINUX_ARM=$(sha256sum vac-linux-aarch64.tar.gz | cut -d ' ' -f 1)

          cat > vac.rb << EOF
          class VAC < Formula
            desc "VAC CLI tool"
            homepage "https://github.com/${{ github.repository }}"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/vac-darwin-aarch64.tar.gz"
                sha256 "${SHA256_DARWIN_ARM}"
              else
                url "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/vac-darwin-x86_64.tar.gz"
                sha256 "${SHA256_DARWIN_X64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/vac-linux-aarch64.tar.gz"
                sha256 "${SHA256_LINUX_ARM}"
              else
                url "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/vac-linux-x86_64.tar.gz"
                sha256 "${SHA256_LINUX_X64}"
              end
            end

            def install
              bin.install "vac"
            end
          end
          EOF

          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add vac.rb
          git commit -m "Update vac to v${VERSION}"
          git push
